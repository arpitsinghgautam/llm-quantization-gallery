  tldr: >
    PB-LLM ("Partially Binarized") proposes a hybrid strategy where a fraction of weights
    are binarized ({-1, +1}) while the most salient weights (by Hessian-based importance)
    are retained at full precision (FP8 or FP16). This avoids the catastrophic perplexity
    collapse of full binarization while still achieving very low average bit-width. The
    saliency metric is the Hessian diagonal, and the method is applied post-training
    without QAT — making it a PTQ approach despite being in the extreme low-bit category.
  key_idea: >
    For each linear layer, compute saliency s_ij = [H]_ii · w_ij² (Hessian diagonal ×
    weight squared) for each weight. Keep the top-p% of weights (by saliency) at FP16
    and binarize the rest. The effective bit-width is approximately 1 + p × 15 bits
    (the binary part is ~1 bit, the FP16 part is 16 bits weighted by fraction p).
    At p=0.5%, effective bits ≈ 1.08; at p=10%, ≈ 2.5. A key finding is that the salient
    weights form a sparse pattern with no structure (unlike pruning where rows or columns
    can be dropped), so sparse matrix operations are needed.

