  tldr: >
    The K-quant formats in llama.cpp use a two-level hierarchical quantization scheme.
    A super-block of 256 weights contains several inner blocks of 16–32 weights each.
    Each inner block has its own low-precision scale (quantized), while the super-block
    stores the dequantization scale for those inner-block scales in a higher precision.
    Different K-quant variants (Q2_K, Q3_K, Q4_K_S, Q4_K_M, Q5_K, Q6_K) differ in
    the number of bits for both the weights and the block scales, and optionally assign
    higher precision to specific layers (e.g. attention layers in _M variants).
  key_idea: >
    The hierarchy is: weights at b bits → inner-block scale at b' bits → super-block
    scale at FP16. For Q4_K_M: 4-bit weights, 6-bit inner-block scales (for every
    32 weights), FP16 super-block scale (for every 256 weights), with attention
    output and feed-forward gate layers boosted to 6-bit. The _S suffix means
    "small" (uniform across layers); _M means "medium" (mixed layers). This two-level
    scheme amortizes the scale overhead and achieves better quality-per-byte than
    flat per-group quantization with the same group size.

