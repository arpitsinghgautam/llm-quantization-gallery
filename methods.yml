  requires_training: false
  requires_calibration_data: false
  typical_degradation: "n/a — kernel, not algorithm"

  tldr: >
    Marlin is a high-performance CUDA kernel library for W4A16 and W4A8 grouped-quantized
    matrix multiplication on NVIDIA GPUs. For a transformer layer serving a single token
    (decode phase), the bottleneck is memory bandwidth: loading the 4-bit weight matrix.
    Marlin achieves close to the theoretical memory bandwidth limit of A100/H100 by carefully
    designing warp layouts, prefetching patterns, and the FP16 dequantization pipeline to
    overlap computation with memory loads. It is integrated into vLLM, TRT-LLM, and SGLang.
  key_idea: >
    Marlin's kernel decomposes the matmul into tiles processed by persistent warps.
    Each warp prefetches the next tile of INT4 weights from global memory while the
    previous tile's FP16 dequantization and tensor-core accumulation runs in parallel.
    The dequantization (unpack INT4 → FP16 using the per-group scale) is fused into
    the memory pipeline so it adds no latency. A careful warp layout avoids shared-memory
    bank conflicts. The result is ~3.7× speedup over FP16 matmul for batch=1 decode on
    A100, matching the theoretical 4× reduction in memory traffic.

  builds_on: ["gptq", "awq"]
  superseded_by: []
