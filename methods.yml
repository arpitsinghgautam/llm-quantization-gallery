  authors: ["Vladimir Malinovskii", "Denis Mazur", "Ivan Ilin", "Denis Kuznedelev", "Alexander Bukharin", "Kai Han", "Dan Alistarh", "Peter Richtárik"]
  affiliation: ["KAUST", "IST Austria", "EPFL"]
