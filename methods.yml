  diagram_caption: "PQCache: product quantization of KV vectors — each sub-vector maps to a codebook index."

- id: coupled-quant
  name: Coupled Quantization
  full_name: "Coupled Quantization: Accurate 1-bit KV Cache Quantization in LLMs"
  category: kv_cache
  subcategory: coupled-error
  year: 2024
  date: 2024-02-18
  authors: ["Hanlin Tang", "Yang Lin", "Jing Lin", "Qinghao Hu", "Yiming Li", "Ting Cao", "Zhengzhong Liu", "Ningyi Xu"]
  affiliation: ["Shanghai Jiao Tong University", "Microsoft Research"]
  paper_url: https://arxiv.org/abs/2402.11535
  code_url: null
  blog_url: null
  venue: null

  precision: "W16A16KV1/KV2"
  granularity: "per-head"
  calibration: "none"
  symmetric: asymmetric
  handles_outliers_via: "coupled K-V error cancellation: K and V quantization errors are designed to cancel in the attention output"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "enables 1-bit KV cache with acceptable quality loss; significantly better than independent 1-bit quantization"

  tldr: >
    Coupled Quantization observes that the errors in the quantized K and V caches are not
    independent in their effect on the attention output: the attention score (from Q×K) and
    the value aggregation (softmax×V) interact in a way that allows the error from K
    quantization to partially cancel the error from V quantization. By jointly designing the
    K and V quantization to exploit this cancellation (selecting quantization parameters that
    minimize the total attention output error rather than minimizing K error and V error
    separately), Coupled Quantization achieves much better quality at 1-bit KV than either
    independent 1-bit K or 1-bit V quantization.
  key_idea: >
    The attention output for position t is: o_t = Σ_s softmax(q_t k_s / √d) × v_s.
    With quantized k̃_s and ṽ_s, the error is: δo_t = Σ_s ∂softmax/∂(q_t k_s) × q_t δk_s × v_s
    + Σ_s softmax(q_t k̃_s / √d) × δv_s. These two error terms have different signs and
    can partially cancel if chosen carefully. Coupled Quantization jointly optimizes
    (scale_K, zero_K, scale_V, zero_V) per head to minimize ‖ δo ‖ rather than
    ‖ δK ‖ and ‖ δV ‖ independently. The joint optimization is tractable and runs online.

  builds_on: ["kivi", "rtn"]
  superseded_by: []
  related: ["kivi", "kvquant", "qaq"]

  diagram: assets/diagrams/coupled-quant.svg
  diagram_caption: "Jointly optimize K and V quantization parameters to minimize attention output error via error cancellation."

