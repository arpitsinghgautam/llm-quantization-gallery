  hardware_target: "GPU"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "W4A8 comparable to PTQ methods; W4A8KV4 enables 4-bit KV with minimal loss"

  tldr: >
    LLM-QAT performs quantization-aware training of LLMs without any task data by using the
    model's own generations as training examples — the model "teaches itself" to be robust
    to quantization noise. This data-free approach avoids privacy concerns and the cost of
    collecting task-specific data. During QAT, the straight-through estimator (STE) provides
    gradients through the quantization step, and the training objective is standard next-token
    prediction on the self-generated text. The method also quantizes the KV cache to 4 bits,
    which was novel at the time.
  key_idea: >
    Training data is generated by sampling from the (FP16) model itself using temperature
    sampling. The model is then fine-tuned on these samples with simulated quantization
    inserted: all weight matrices and activations have fake quantization applied in the
    forward pass (quantize then dequantize), and the STE carries gradients through.
    Both weights and activations are jointly quantized to W4A8. A separate QAT phase
    for the KV cache (quantizing K and V to INT4 during generation) allows W4A8KV4
    models. The result is models that are inherently robust to quantization at inference.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["qlora", "bitdistiller", "efficientqat"]

