  diagram_caption: "Per-token dynamic activation scales + per-group static weight scales for W8A8."

- id: zeroquant-v2
  name: ZeroQuant-V2
  full_name: "ZeroQuant-V2: Exploring Post-training Quantization in LLMs from Comprehensive Study to Low Rank Compensation"
  category: ptq_weight_activation
  subcategory: per-token-activation
  year: 2023
  date: 2023-03-15
  authors: ["Zhewei Yao", "Xiaoxia Wu", "Cheng Li", "Stephen Youn", "Yuxiong He"]
