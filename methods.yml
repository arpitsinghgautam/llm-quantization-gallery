- id: outlier-suppression
  name: Outlier Suppression
  full_name: "Outlier Suppression: Pushing the Limit of Low-bit Transformer Language Models"
  category: ptq_weight_activation
  subcategory: outlier-mitigation
  year: 2022
  date: 2022-09-27
  authors: ["Xiuying Wei", "Yunchen Zhang", "Xiangguo Zhang", "Ruihao Gong", "Shanghang Zhang", "Qi Zhang", "Fengwei Yu", "Xianglong Liu"]
  affiliation: ["Beihang University", "Sensetime Research"]
  paper_url: https://arxiv.org/abs/2209.13325
  code_url: null
  blog_url: null
