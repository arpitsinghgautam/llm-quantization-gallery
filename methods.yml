  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "better than MoQE on Mixtral-8x7B at same compression ratio"

  tldr: >
    MC-MoE (Mixture Compressor for MoE) combines expert pruning with quantization to
    achieve higher compression of MoE models than quantization alone. Experts are first
    analyzed for their contribution to model outputs (using activation frequency and
    Hessian-based sensitivity). Low-importance experts are fully pruned (removed). The
    remaining experts are quantized with bit-widths proportional to their importance.
    This co-design of pruning and quantization gives a better quality-vs-size tradeoff
    than either technique alone for MoE models.
  key_idea: >
    Two-stage compression: (1) Expert pruning — rank experts by score = activation_frequency
    × reconstruction_sensitivity. Prune bottom-k% of experts entirely (replacing them with
    the average of nearby experts for output stability). (2) Mixed-precision quantization —
    apply GPTQ or AWQ to remaining experts with bit-width proportional to importance rank.
    Shared experts (if present, as in DeepSeek-MoE) are always kept at higher precision.
    The pruning step reduces the total parameter count before quantization, allowing the
    remaining budget to be concentrated on the most important experts.

  builds_on: ["moqe", "gptq"]
  superseded_by: []
  related: ["moqe", "gptq", "awq"]

  diagram: assets/diagrams/mc-moe.svg
  diagram_caption: "MC-MoE: prune low-importance experts first, then mixed-precision quantize remaining experts."

