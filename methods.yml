    per-tensor approach. Weights: each 1×128 row segment has its own FP8 scale. Activations:
    each 128×128 block has its own FP8 scale. This finer granularity is critical for MoE
    models where different experts have very different activation magnitudes. Accumulation
    is done in FP32 before rescaling back to BF16/FP8. An "activation anomaly" issue
    (some activation channels becoming very large) is handled by clipping with a smooth
    clipping function rather than hard clipping, preventing scale explosion.

