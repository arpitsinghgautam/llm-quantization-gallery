- id: hqq
  name: HQQ
  full_name: "HQQ: Half-Quadratic Quantization of Large Machine Learning Models"
  category: ptq_weight_only
  subcategory: robust-optimization
  year: 2023
  date: 2023-11-19
  authors: ["Hicham Badri", "Appu Shaji"]
  affiliation: ["Mobius Labs"]
  paper_url: null
  code_url: https://github.com/mobiusml/hqq
  blog_url: https://mobiusml.github.io/hqq_blog/
  venue: null

  precision: "W2/W3/W4/W8 A16"
  granularity: "per-group, g=64 (default)"
  calibration: "none — weights only"
  symmetric: asymmetric
  handles_outliers_via: "robust half-quadratic (Huber-like) loss minimization during scale/zp optimization"
  hardware_target: "GPU; custom CUDA/Triton kernels for W4A16 and W2A16"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "competitive with GPTQ at 4-bit; better than RTN at 3-bit"

  tldr: >
    HQQ finds optimal quantization parameters (scale and zero-point) by directly minimizing
    a robust loss between the original and quantized weights using half-quadratic optimization,
    without any calibration data. The half-quadratic penalty is a smoothed version of L1
    that down-weights large residuals (outliers), making the scale/zp solution robust to
    weight outliers. Because it needs no activations, HQQ is significantly faster to run
    than GPTQ and can quantize a 70B model in under a minute on CPU. Quality is close to
    GPTQ at 4-bit and significantly better than RTN, especially at lower bits.
  key_idea: >
    Standard RTN minimizes ‖W − Q(W)‖² w.r.t. the scale s and zero-point z, but this
    mean-squared loss is sensitive to outliers. HQQ instead solves:
    min_{s,z} Σ ρ(w_i − Q(w_i; s, z)) where ρ is a half-quadratic (Huber-like) penalty.
    This is solved by iterative half-quadratic optimization: alternating between a quadratic
    subproblem for s and z (given auxiliary variables) and an update of auxiliary variables
    (given s and z). The result is a set of quantization parameters that minimize the
    robust loss without requiring any calibration data.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["gptq", "awq", "rtn"]

  diagram: assets/diagrams/hqq.svg
  diagram_caption: "Robust half-quadratic loss minimization for scale/zero-point — no calibration data needed."

