  tldr: >
    QAQ adaptively allocates bit-widths across KV cache entries based on their predicted
    importance to the attention output. Tokens that receive high attention scores (the
    "attention sink" phenomenon — early tokens and recent tokens tend to receive
    disproportionate attention) are assigned higher-precision quantization, while tokens
    with low attention scores can be safely compressed to very low bits (even 1–2 bits).
    This adaptive allocation achieves better quality per average bit than uniform quantization
    across all tokens.
  key_idea: >
    QAQ uses a proxy for KV importance: the accumulated attention scores that a token has
    received across all heads and layers so far. Tokens with high accumulated attention
    (estimated from running statistics during generation) are assigned more bits in the KV
    cache; tokens with low accumulated attention are compressed further. The allocation is
    updated dynamically as new tokens arrive: a token's assigned bit-width can increase if
    later layers find it important. The implementation uses a budget-constrained allocation
    that targets an average bit-width (e.g. 3.0 bpw) while minimizing peak allocation.

