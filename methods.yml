  blog_url: null
  venue: "ICLR 2025"
  precision: "Q8K8V16 (INT8 Q and K for QK^T, FP16 V)"
  granularity: "per-token for Q and K quantization"
  calibration: "none (dynamic at runtime)"
  symmetric: symmetric
  handles_outliers_via: "per-token smooth quantization of Q and K before INT8 cast"
  hardware_target: "GPU (CUDA); H100 / A100 optimized"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.5% on most tasks; 2.1x attention speedup on A100"
  tldr: >
    SageAttention quantizes Q and K to INT8 to compute the attention score matrix
    (QK^T) using integer tensor cores, while keeping V in FP16. A plug-and-play
    drop-in for standard attention requiring no fine-tuning or calibration. Per-token
    smooth quantization handles outliers. Achieves ~2x speedup on the attention
    operation with near-zero quality loss across language, vision, and video tasks.
  key_idea: >
    The QK^T matmul dominates attention FLOPs at long context. SageAttention replaces
    it with INT8 GEMM: each Q and K token vector is scaled to INT8 range independently
    (per-token quantization), QK^T is computed in INT8 on tensor cores, then
    dequantized before softmax. The weighted sum AV uses FP16 V unchanged.
    SageAttention2 (Nov 2024) extends to mixed INT4/INT8 Q/K for further speedup.
  builds_on: ["smoothquant"]
