- id: qllm
  name: QLLM
  full_name: "QLLM: Accurate and Efficient Low-Bitwidth Quantization for Large Language Models"
  category: ptq_weight_activation
  subcategory: channel-reassembly
  year: 2023
  date: 2023-10-12
  authors: ["Jing Liu", "Ruihao Gong", "Xiuying Wei", "Zhiwei Dong", "Jianfei Cai", "Bohan Zhuang"]
  affiliation: ["Monash University", "Sensetime Research"]
  paper_url: https://arxiv.org/abs/2310.08041
  code_url: null
  blog_url: null
  venue: "ICLR 2024"

  precision: "W4A8"
  granularity: "per-channel (after channel reassembly)"
  calibration: "calibration set"
  symmetric: asymmetric
  handles_outliers_via: "channel reassembly: split outlier channels into sub-channels with lower amplitude"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl W4A8 on LLaMA at 7B"

  tldr: >
    QLLM tackles activation outliers by "channel reassembly": splitting each outlier activation
    channel into multiple sub-channels whose individual amplitudes fall within the quantizable
    range. This is complementary to smoothing-based methods: instead of migrating outlier
    energy to weights (SmoothQuant), QLLM splits the outlier channel itself into two or more
    channels of smaller amplitude. The split is handled by adjusting the corresponding
    weight rows, maintaining mathematical equivalence. After reassembly, standard per-channel
    or per-token INT8 quantization works well on all channels.
  key_idea: >
    For an outlier activation channel j with activation x_j that is consistently |x_j| >> rest,
    QLLM splits x_j into K sub-channels by defining: x'_{j,k} = x_j / K for k=1..K, and
    correspondingly splits the weight row w_j into K rows w'_{j,k} = w_j (unchanged value,
    since their product sums back to w_j × x_j). The number of splits K for channel j is
    determined by how much its amplitude exceeds the per-tensor quantization range. The
    reassembled tensor has K times more channels but all within range. The overhead is small
    because only ~1% of channels are outliers.

  builds_on: ["smoothquant", "rtn"]
  superseded_by: []
  related: ["smoothquant", "rptq", "atom"]

  diagram: assets/diagrams/qllm.svg
  diagram_caption: "Channel reassembly: outlier channel split into K sub-channels each within quantizable range."

