  precision: "W16A16KV2"
  granularity: "per-channel g=16 (K); per-token (V); residual cache at FP16"
  calibration: "none"
  symmetric: asymmetric
  handles_outliers_via: "recent tokens kept at FP16 (residual); per-channel K grouping reduces outlier impact"
  hardware_target: "GPU (custom FlashAttention-2 kernel)"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.3 ppl at KV2 on LLaMA-2-7B (WikiText-2); 2.35× throughput"

  tldr: >
    KIVI proposes a simple but effective asymmetric quantization strategy for KV cache:
    keys are quantized per-channel (using groups of 16 consecutive elements in the channel
    dimension), and values are quantized per-token. This asymmetric choice is motivated by
    empirical observation: K vectors have consistent per-channel magnitude patterns across
    all tokens (stable per-channel statistics), while V vectors have consistent per-token
    patterns. The most recent r=32 tokens are kept in FP16 as a "residual cache" to avoid
    quantizing newly computed KV entries before they stabilize. Implemented as a FlashAttention
    plugin with no tuning needed.
  key_idea: >
    For the key cache K ∈ ℝ^{T × d_head}: divide d_head into groups of g=16. Per each
    group of each head, compute an asymmetric per-group scale and zero-point from the actual
    values across all T tokens in that group. Quantize to INT2. For the value cache V ∈ ℝ^{T × d_head}:
    compute per-token (per-row) scale and zero-point. Quantize to INT2. At attention time,
    dequantize K and V before computing attention — the dequantization is fused into the
    FlashAttention kernel so it adds < 5% overhead. Recent r tokens' KV are kept as FP16
    and concatenated before attention computation.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["kvquant", "gear", "wkvquant", "think"]

  diagram: assets/diagrams/kivi.svg
  diagram_caption: "K per-group (g=16) asymmetric + V per-token asymmetric + FP16 residual for recent tokens."

