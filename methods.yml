  precision: "W16A16KV2-4 (product quantization)"
  granularity: "per-head, vector quantization (PQ codebook)"
  calibration: "calibration data for codebook learning"
  symmetric: "n/a (codebook-based)"
  handles_outliers_via: "product quantization codebook absorbs all magnitudes"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl at PQ-equivalent 2 bits on LLaMA-2; enables very long context at low memory"

  tldr: >
    PQCache applies Product Quantization (PQ) to the KV cache — a technique borrowed from
    approximate nearest-neighbor search (FAISS) that decomposes each high-dimensional KV vector
    into sub-vectors, each quantized independently with a small codebook. This allows very low
    effective bit-widths (sub-2-bit per dimension) while maintaining good approximation quality
    for the attention computation, as the approximate KV entries are sufficient for the attention
    softmax to produce accurate output probabilities.
  key_idea: >
    Each KV vector of dimension d_head is divided into M sub-vectors of dimension d_head/M.
    For each sub-vector position, a codebook of K centroids is learned (K=256 typical), so
    each sub-vector is stored as a log₂(K) = 8-bit index. The effective bits per dimension:
    M × 8 / d_head — for M=8 and d_head=128: 0.5 bits/dim. At attention time, sub-vectors
    are reconstructed from codebooks for the dot product. Codebooks are shared across all
    tokens and learned from a representative set of KV activations. This approach is
    especially useful at context lengths >32K where KV memory dominates inference cost.

  builds_on: ["kivi", "rtn"]
  superseded_by: []
  related: ["kivi", "kvquant", "aqlm"]

