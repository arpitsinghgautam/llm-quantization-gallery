  typical_degradation: "significantly better than PTQ at W2/W3; approaches W4 PTQ quality at W3"

  tldr: >
    BitDistiller makes sub-4-bit (2-bit and 3-bit) quantization practical by combining
    GPTQ initialization with self-distillation: the FP16 version of the same model serves
    as a teacher, and the quantized model is fine-tuned to match the teacher's output
    distributions (using KL divergence on logits). Because the teacher and student have
    the same architecture, this is "self-distillation." The distillation training signal
    is much richer than cross-entropy on labels, recovering quality that would otherwise
    be lost at extreme bit-widths.
  key_idea: >
    BitDistiller starts from a GPTQ-quantized model (good PTQ initialization) and fine-tunes
    it with a distillation loss: L = KL( softmax(z_teacher / T) ‖ softmax(z_student / T) )
    where z are logits, T is temperature, and the teacher is the FP16 base model.
    The quantized weights (INT2/INT3) are kept frozen in their quantized form; the
    quantization scales (per-group) are the only parameters that get gradient updates from
    the distillation loss. This is lighter than full QAT (no STE over weights), just
    learning optimal scale parameters. The combination of GPTQ init + self-distillation
    scale training achieves W3 quality close to W4 GPTQ.

