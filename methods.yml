  requires_training: true
  requires_calibration_data: false
  typical_degradation: "matches FP16 LLaMA-3B/7B quality at same parameter count (reported)"

  tldr: >
    BitNet b1.58 (named after log₂(3) ≈ 1.58 bits) represents LLM weights as ternary
    values {-1, 0, +1}, one step above binary. The addition of zero is significant:
    it allows the model to implement magnitude selection (zeroing out some directions)
    which binary weights cannot do. Training uses a simple absmean quantizer (scale by
    mean absolute value, round to nearest of {-1, 0, +1}) with STE. The reported result
    is that BitNet b1.58 at 3.9B parameters matches full-precision LLaMA-3B on perplexity
    and most benchmarks, while using a fraction of the memory and enabling inference
    with add-only arithmetic (no multiplications).
  key_idea: >
    Each weight matrix W is quantized per-tensor as: γ = mean(|W|), W̃ = clip(round(W/γ), -1, 1).
    This yields ternary values {-1, 0, +1}. Activations use per-token INT8 quantization.
    The matmul W̃ x with ternary W can be computed without any multiplications:
    result = sum(x_i where W̃_i=+1) - sum(x_i where W̃_i=-1). On hardware with popcount
    instructions or dedicated binary/ternary compute, this is much more energy-efficient
    than float32 or INT8 matmul. The zero weight values effectively prune neurons without
    explicit pruning, allowing the model to learn a sparse-like internal structure.

  builds_on: ["bitnet"]
  superseded_by: []
  related: ["bitnet", "onebit", "billm", "matmul-free"]

  diagram: assets/diagrams/bitnet-b158.svg
  diagram_caption: "Ternary {-1,0,+1} weights via absmean quantizer; matmul becomes add-only (no multiplications)."

