  year: 2024
  date: 2024-10-03
  authors: ["Jintao Zhang", "Jia Wei", "Haofeng Huang", "Pengle Zhang", "Jun Zhu", "Jianfei Chen"]
  affiliation: ["Tsinghua University"]
  paper_url: https://arxiv.org/abs/2410.02367
