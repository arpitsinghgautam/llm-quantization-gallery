  precision: "W8A8"
  granularity: "per-tensor or per-channel"
  calibration: "calibration set for activation statistics"
  symmetric: asymmetric
  handles_outliers_via: "gamma correction and token-level absolute-max shifting for outlier channels"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl on OPT at W6A6"

  tldr: >
    Outlier Suppression identifies that outlier activation channels cause disproportionate
    quantization error and proposes two techniques to mitigate them without changing the
    model architecture. Gamma correction shifts outlier channels by their maximum value
    to center them around zero. Token-level absolute-max clamping clips extreme outlier
    values per-token. Together, these preprocessing steps make the activation distribution
    more amenable to uniform INT8 quantization, achieving W8A8 quality close to FP16
    without any equivalent transformation that modifies weights.
  key_idea: >
    Two components: (1) Channel-wise shifting: for each activation channel j with extreme
    outliers, subtract a pre-computed offset c_j (computed from calibration max values)
    before quantization, and absorb +c_j into the bias of the next layer. This centers the
    distribution. (2) Token-level clamping: clip activations to ±α·σ per token before
    quantization, where σ is estimated from the calibration set. Unlike SmoothQuant,
    Outlier Suppression avoids modifying weight matrices (no absorbed scaling into weights),
    making it compatible with models where the preceding layer is not a LayerNorm.

  builds_on: ["rtn"]
  superseded_by: ["outlier-suppression-plus"]
  related: ["smoothquant", "llm-int8", "rptq"]

  diagram: assets/diagrams/outlier-suppression.svg
  diagram_caption: "Channel shifting + token clamping center the activation distribution for INT8."

