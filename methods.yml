  requires_calibration_data: true
  typical_degradation: "IQ4_XS at ~4.25 bits beats Q4_K_M; IQ2_XXS at ~2.06 bits is usable"

  tldr: >
    I-quants are the "importance-aware" quantization formats in llama.cpp, superseding K-quants
    for quality at the same or lower bit-width. They require an "importance matrix" (imatrix)
    computed by running the model on a representative sample and recording the squared mean
    activation for each weight row. Weights in rows with high importance scores are quantized
    more carefully (or get more effective bits). The quantization grid itself uses lattice
    codebooks derived from the paper "Improved Lattice Quantization via Dual Quantization"
    rather than uniform linear scales, allowing non-uniform grids that fit the weight
    distributions better.
  key_idea: >
    The imatrix records ‖x_j‖² per row j (the squared norm of input activations for each
    weight row), collected by one forward pass on a calibration corpus. At quantization time,
    rows with higher importance are assigned more bits or have their quantization refined
    more carefully. The quantization codebooks for sub-4-bit formats are lattice-based
    (derived from integer lattices), not simple uniform grids. IQ4_NL uses a "non-linear"
    4-bit codebook derived from the NF4 quantile approach. Sub-3-bit formats (IQ2_*, IQ1_S)
    use group-wise lattice VQ with the imatrix weighting to preserve perplexity at
    extremely low bit rates.

