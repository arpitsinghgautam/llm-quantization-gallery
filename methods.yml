  tldr: >
    IR-QLoRA identifies that the NF4 quantization grid used in QLoRA is fixed (based on
    the standard normal distribution) and may not be optimal for every layer's actual
    weight distribution. IR-QLoRA adapts the NF4 quantization levels per layer by minimizing
    the information loss (measured by the KL divergence between the original and quantized
    weight distributions), and additionally uses a confidence-guided LoRA training approach
    where LoRA updates are weighted by the model's prediction confidence to avoid wasted
    gradient on easy examples.
  key_idea: >
    Two components: (1) Information Calibration — the NF4 quantization levels for each
    layer are shifted slightly from the standard-normal quantiles to the empirical quantiles
    of that layer's actual weight distribution, minimizing KL divergence between Q(W) and W.
    This is a cheap per-layer histogram operation requiring no data. (2) Confidence-guided
    LoRA — during fine-tuning, the LoRA gradient for each training example is scaled by
    (1 − p(y|x)), the model's uncertainty, focusing updates on harder examples where
    the quantized model is most uncertain.

