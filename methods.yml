  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.3 ppl at W4A16 LLaMA-7B; competitive at W4A8"

  tldr: >
    OmniQuant optimizes quantization parameters (clipping range, scale, zero-point) directly
    through gradient descent on a block-wise reconstruction loss, rather than computing them
    analytically from statistics. The learnable clipping approach (LWC) allows the clipping
    range to adapt to the actual distribution, trading off more clips against smaller scale.
    A learnable equivalent transformation (LET) handles the activation quantization case by
    absorbing a channel-wise scale into the preceding layer (analogous to SmoothQuant but
    with learned parameters). Both weight-only and weight+activation modes are supported.
  key_idea: >
    OmniQuant frames quantization as an optimization problem: given a block of transformer
    layers, find quantization parameters θ = {s, z, α_clip} that minimize the block's
    reconstruction loss ‖ f(X; W) − f(X; Q(W; θ)) ‖² where X is a calibration batch.
    Only θ is updated; the original weights W are frozen. The LWC component learns the
    clipping factor α per tensor, and the LET component learns per-channel scale factors
    that are absorbed into preceding linear or LayerNorm weights. Optimization runs for
    ~20 minutes on a 7B model with a small calibration set.

