- id: flute
  name: FLUTE
  full_name: "FLUTE: Flexible Lookup Table for Efficient, Scalable Unified LLM Compression"
  category: ptq_weight_only
  subcategory: lookup-table
  year: 2024
  date: 2024-07-15
  authors: ["Junxian Guo", "Charles Hao Ding", "Kimish Patel", "Zhen Zheng", "Karttikeya Mangalam", "Qijing Huang", "Gian Angelo Franchi", "Michael W. Mahoney", "Kurt Keutzer", "Amir Gholami"]
  affiliation: ["UC Berkeley"]
  paper_url: https://arxiv.org/abs/2407.10960
  code_url: https://github.com/HanGuo97/flute
  blog_url: null
  venue: "NeurIPS 2024"
  precision: "W3/W4 A16"
  granularity: "per-group, learned codebook"
  calibration: "calibration set for codebook learning"
  symmetric: asymmetric
  handles_outliers_via: "non-uniform codebook levels fit to weight distribution"
  hardware_target: "GPU; custom CUDA LUT kernel fused with GEMM"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "comparable to GPTQ; faster inference due to fused kernel"
  tldr: >
    FLUTE represents quantized weights as small learned lookup tables (codebooks) per
    group, rather than uniform scalar quantization. A custom CUDA kernel fuses the
    lookup-table decode step with the GEMM operation, eliminating explicit dequantization
    overhead. Supports 2-to-4-bit weight-only quantization, achieves accuracy competitive
    with GPTQ, and delivers faster inference through the fused kernel design.
  key_idea: >
    For each weight group, FLUTE learns a small codebook (e.g. 16 entries for 4-bit)
    that minimizes reconstruction error. At inference, the FLUTE CUDA kernel reads 4-bit
    indices, performs table lookups to recover FP16 values, and immediately feeds them
    into GEMM accumulation in a single fused kernel. This eliminates the separate
    dequant pass. Non-uniform codebook levels (like k-means or NF4 bins) are naturally
    supported without extra cost, giving better accuracy than uniform quantization at the
    same bit-width.
  builds_on: ["gptq", "gguf-kquants"]
  superseded_by: []
