  tldr: >
    ApiQ extends the QLoRA/LoftQ approach to the extreme 2-bit regime. At 2 bits, the
    quantization error of the base model is so large that naive QLoRA (random LoRA init +
    2-bit base) fails to converge to good quality. ApiQ addresses this by using an
    activation-aware initialization of the LoRA adapters that directly minimizes the
    output error of each layer before fine-tuning starts, analogous to LoftQ but tailored
    to the higher-error 2-bit case and using activations rather than pure weight error.
  key_idea: >
    ApiQ initializes LoRA adapters by minimizing the layer-wise output error:
    ‖ W_FP16 X − (Q(W) + B·A) X ‖² where X is drawn from a calibration set.
    This is solved approximately by taking B·A = W_FP16 − Q(W) (the quantization error)
    and computing the rank-r approximation via SVD of the activation-weighted error
    (X^T (W − Q(W))^T). The key difference from LoftQ: the initialization accounts for
    the activation distribution X, not just the weight matrix. For 2-bit models where
    ‖ W − Q(W) ‖ is large, this better initialization is critical for convergence.

