  tldr: >
    DuQuant extends the rotation-based quantization paradigm by applying two transformations
    instead of one: a channel-wise Hadamard rotation (like QuaRot) to handle outliers
    that persist in specific channels, followed by a block-diagonal rotation across tokens
    within each group to further smooth the activation distribution across the sequence
    dimension. The dual rotation is more expressive than a single rotation and can eliminate
    outliers that persist after a single Hadamard pass.
  key_idea: >
    Two rotation stages: (1) A randomized block-diagonal Hadamard rotation H_c applied
    across channels per token — same as QuaRot, handles intra-token channel outliers.
    (2) A permutation + rotation H_t applied across a window of tokens within each
    activation group, smoothing out any temporal outliers that persist after step 1.
    The combination of channel-wise and token-wise rotations addresses both sources of
    activation non-uniformity. Both rotations are orthogonal and are absorbed into the
    preceding weight matrices offline. This dual approach reduces the post-rotation
    quantization error further than single-rotation methods.

