    AutoAWQ is the standard Python package for applying AWQ quantization to Hugging Face
    models. Like AutoGPTQ for GPTQ, AutoAWQ provides a simple API for quantizing any
    supported LLM architecture to W4A16 AWQ format, which can then be uploaded to Hugging
    Face Hub or used directly for inference. AWQ-quantized models typically have slightly
    better quality than GPTQ at the same group size due to the activation-guided scaling.
