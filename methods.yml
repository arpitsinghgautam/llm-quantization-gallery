  calibration: "calibration set for SVD of K/V projection matrices"
  symmetric: "n/a (low-rank)"
  handles_outliers_via: "low-rank projection inherently compresses; less sensitive to individual outliers"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "50% K/V cache size reduction at < 1 ppl on LLaMA-2"

  tldr: >
    Palu compresses the KV cache not by quantizing its values but by projecting K and V
    into a low-rank subspace before caching, and projecting back at attention time. The
    low-rank projection is learned offline by truncated SVD of the K and V projection
    matrices (W_K and W_V). If W_K ≈ U Σ Vᵀ and we keep only the top-r singular values,
    keys can be stored as low-rank factors rather than full-rank vectors, reducing the
    cache size by factor d/r. This is a fundamentally different approach from bit-reduction
    quantization — it reduces the dimensionality of the cache rather than the precision.
  key_idea: >
    Original: k = x W_K (d→d projection). Palu: factorize W_K ≈ W_K^low W_K^proj where
    W_K^low ∈ ℝ^{d×r} and W_K^proj ∈ ℝ^{r×d}. Cache only the low-rank representation:
    k_low = x W_K^low ∈ ℝ^r (store r floats instead of d floats). At attention time,
    reconstruct: k = k_low W_K^proj for the dot product. The SVD of W_K is computed once
    offline from calibration data that tells which directions of k are most important.
    The rank r is the compression knob: r = d/2 gives 50% cache reduction. Palu also
    applies to V. The method can be combined with quantization of the low-rank k_low vectors.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["gear", "think", "kvquant"]

  diagram: assets/diagrams/palu.svg
  diagram_caption: "Low-rank KV projection: cache r-dim k_low instead of d-dim k; reconstruct at attention."

