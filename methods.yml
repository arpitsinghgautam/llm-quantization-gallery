  tldr: >
    Outlier Suppression+ extends the original Outlier Suppression by framing the shift and
    scale selection as an optimization problem rather than using heuristic rules. Given a
    linear layer, it finds the per-channel shift (s) and scale (α) that minimize the
    expected quantization error subject to the constraint that the transformation is
    equivalent (can be absorbed into surrounding layers without changing model output).
    The optimal parameters are found analytically using first- and second-order statistics
    from the calibration set. The result is consistently better than heuristic approaches.
  key_idea: >
    For a linear operation Y = XW + b, we seek channel-wise transformations X' = (X + s)·α
    that minimize the quantization error Q(X') while being mathematically equivalent
    (the corresponding inverse transforms are absorbed into W and b).
    Setting s_j = -median(X_j) (centering) and α_j based on the MMSE quantization scale
    for the resulting distribution yields an analytically optimal solution under the
    per-channel quantization model. Extended to cover both weight and activation channels,
    and shown to generalize across model families without per-model tuning.

