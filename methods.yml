  precision: "MXFP8 / MXFP6 / MXFP4 / MXINT8"
  granularity: "block of 32 elements share one 8-bit E8M0 exponent scale"
  calibration: "no calibration — block scale computed from block max"
  symmetric: symmetric
  handles_outliers_via: "block-level exponent covers the block's dynamic range; outliers within a block are captured by the block scale"
  hardware_target: "NVIDIA Blackwell (B100/B200/GB200), AMD MI300X, Intel Gaudi, ARM"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "MXFP8: comparable to FP8; MXFP4: slight quality reduction vs MXFP8"

  tldr: >
    Microscaling (MX) is an industry standard for block floating-point formats, standardized
    by the Open Compute Project (OCP) with participation from AMD, ARM, Intel, Meta, Microsoft,
    NVIDIA, Qualcomm, and Samsung. Each MX format defines blocks of 32 elements that share
    a single 8-bit exponent scale (E8M0, i.e. just an 8-bit integer exponent with no mantissa).
    Within a block, each element has its own mantissa bits: MXFP8 (3 mantissa), MXFP6 (2),
    MXFP4 (0), MXINT8 (7-bit signed int). This block-scale approach provides more dynamic
    range than per-tensor quantization with lower overhead than per-element scales.
  key_idea: >
    An MX tensor is divided into contiguous blocks of 32 elements. For each block:
    (1) find the maximum absolute value, compute the E8M0 scale = floor(log₂(max)) as an
    8-bit integer exponent; (2) scale each element by 2^{-scale} and round to the element
    format (e.g. FP4 E2M1 for MXFP4). Storage: 32 × b bits + 8 bits per block (where b is
    element bit-width). Compared to per-tensor FP8: block scaling captures local dynamic
    range variation (e.g. outlier channels) without per-element overhead. Compared to INT8:
    floating-point mantissa bits provide non-linear grid spacing. Supported natively in
    Blackwell GPU Tensor Cores.

  builds_on: ["fp8-training"]
  superseded_by: []
  related: ["fp8-training", "nvfp4", "deepseek-fp8"]

  diagram: assets/diagrams/mx-formats.svg
  diagram_caption: "MX block-float: 32 elements share one 8-bit exponent; elements store mantissa bits."

