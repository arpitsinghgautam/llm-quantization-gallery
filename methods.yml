  tldr: >
    RPTQ observes that activation outliers tend to appear in specific channels that are
    consistently high-magnitude, while other channels are low-magnitude. Instead of handling
    them separately (LLM.int8()) or scaling them away (SmoothQuant), RPTQ reorders
    activation channels into clusters of similar magnitude and then applies per-cluster
    quantization. By grouping high-magnitude channels together into their own cluster, the
    per-cluster dynamic range is reduced relative to per-tensor quantization, allowing
    lower-bit quantization with less error.
  key_idea: >
    Offline, use k-means clustering on activation channel magnitudes (from calibration data)
    to group channels by their expected value range. At inference, permute activation channels
    to bring cluster members together, then apply per-cluster INT8/INT4 quantization
    (one scale per cluster). The same permutation is applied to the weight matrix columns.
    Since the reordering is the same for every token, it can be absorbed as a fixed permutation
    matrix into the weight, adding no runtime overhead. Quantizing per-cluster of
    similar-magnitude channels gives lower error than per-tensor at the same bit-width.

