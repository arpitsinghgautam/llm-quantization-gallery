  precision: "W16A16KV4 / KV3"
  granularity: "per-channel (K); per-token (V); non-uniform quantization grid"
  calibration: "calibration set for K/V distribution"
  symmetric: asymmetric
  handles_outliers_via: "non-uniform quantile-based (NUQ) quantization adapts grid to K/V distribution; per-channel K"
  hardware_target: "GPU (FlashAttention-compatible)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl at KV4; enables 10M context on single A100 by reducing KV cache memory"

  tldr: >
    KVQuant is a comprehensive KV-cache quantization framework that targets extreme context
    lengths (millions of tokens) where the KV cache is the dominant memory consumer.
    Three key innovations: non-uniform quantization (NUQ) fits the K/V value distributions
    (which are not Gaussian) with per-quantile codebooks; per-channel quantization for K
    and per-token for V to match their respective structure; and a sparse high-precision
    overlay for outlier KV entries. Together, KVQuant achieves 4-bit KV cache with
    < 0.1% perplexity increase and enables 10M+ context length inference.
  key_idea: >
    Three technical contributions: (1) Non-uniform KV quantization (NUQ) — calibrate
    quantization levels at the quantiles of the actual K/V distribution (from calibration
    data), which fits the often-skewed distributions better than uniform grids. (2)
    Asymmetric per-channel quantization for K: each head's K channel has a fixed distribution
    across tokens, so per-channel scales computed from calibration are stable and low-error.
    Per-token quantization for V. (3) Sparse residual: for the ~1% of KV entries with
    largest quantization error (the "sink" tokens plus early positions), store the FP16
    value and add it to the dequantized KV at attention time.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["kivi", "gear", "think", "skvq"]

