  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.5 ppl at 4-bit average on LLaMA-2 family; outperforms uniform KV4"

  tldr: >
    ZipCache quantizes the KV cache with mixed precision, assigning more bits to "salient"
    tokens — those with high cumulative attention scores that are frequently attended to.
    The attention score of each token is tracked dynamically during generation, and tokens
    whose cumulative attention score exceeds a threshold are assigned higher-precision
    quantization (or kept at FP16). The remaining low-attention tokens are compressed more
    aggressively. This adaptive allocation outperforms uniform KV quantization at the same
    average bit-width with no additional calibration.
  key_idea: >
    ZipCache maintains a running sum of attention scores for each KV position across all
    heads and layers. Positions whose cumulative importance score exceeds a dynamic threshold
    θ (tuned to achieve a target average bit-width) are quantized at high precision (INT8 or
    FP16); others are quantized at INT4 or lower. The threshold is updated online as new
    tokens arrive. The approach is motivated by the "attention sink" phenomenon: early tokens
    and locally-important tokens receive disproportionate attention and must be preserved at
    high quality. Unlike KIVI or SKVQ, ZipCache's mixed precision is content-adaptive, not
    position-based.

  builds_on: ["kivi", "qaq"]
  superseded_by: []
