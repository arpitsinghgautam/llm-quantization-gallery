  typical_degradation: "improved vs ZeroQuant at W4A8 with LoRC"

  tldr: >
    ZeroQuant-V2 extends ZeroQuant with a comprehensive study of quantization granularity
    effects and a new technique called Low-Rank Compensation (LoRC). LoRC adds a low-rank
    matrix decomposition of the quantization error to the quantized weight matrix:
    given the error E = W − Q(W), compute a rank-r approximation Ê = UV^T via SVD,
    and store Ŵ + Ê instead of just Ŵ. This extra low-rank correction (with very small
    memory overhead) compensates for the most structured part of the quantization error,
    recovering significant accuracy at W4A8 precision.
  key_idea: >
    Low-Rank Compensation: given quantization error E = W − Q(W), compute truncated SVD
    U Σ Vᵀ ≈ E keeping top-r singular values. Store the quantized weight as Q(W) + U·(ΣVᵀ),
    where UΣV^T is kept in FP16 and multiplied separately during inference. The overhead
    is r × (d_in + d_out) FP16 parameters per layer, which is small for r=4–16.
    Combined with the ZeroQuant per-group weight / per-token activation scheme, this
    gives the accuracy of W4A8 within 1 point of W8A8 on GPT-3-scale models.

  builds_on: ["zeroquant"]
  superseded_by: ["zeroquant-fp"]
  related: ["zeroquant", "atom", "smoothquant"]

  diagram: assets/diagrams/zeroquant-v2.svg
  diagram_caption: "Low-Rank Compensation: SVD of quantization error added back to quantized weights."

