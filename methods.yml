  precision: "W2/W4 A16 (expert-specific)"
  granularity: "per-expert, mixed bit-widths"
  calibration: "calibration set for expert importance"
  symmetric: asymmetric
  handles_outliers_via: "more important experts get higher precision"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl vs uniform expert quantization at same average bits"

  tldr: >
    MoQE (Mixture of Quantization Experts) addresses the unique quantization challenge of
    Mixture-of-Experts (MoE) models: the MoE architecture has many experts (sub-networks),
    but only a few activate per token. Calibration data therefore sees each expert only a
    small fraction of the time, making Hessian estimation unreliable. MoQE assigns different
    bit-widths to different experts based on their activation frequency and importance —
    frequently-activated experts get more bits, rarely-activated experts can tolerate
    lower precision. This expert-aware mixed-precision scheme beats uniform quantization
    of all experts at the same average bit-width.
  key_idea: >
    MoQE assigns bit-widths per expert based on two factors: (1) activation frequency —
    how often each expert is routed to across the calibration set (can be computed cheaply
    from the router logits); (2) quantization sensitivity — the reconstruction error of
    each expert when quantized (requires a calibration forward pass through each expert).
    A budget-constrained allocation then assigns higher bits to experts with high
    frequency × sensitivity and lower bits to others, maintaining an average bit-width
    target. The router weights and non-expert transformer components (attention, LayerNorm)
    remain at FP16.

  builds_on: ["gptq"]
  superseded_by: []
  related: ["gptq", "awq", "deepseek-fp8"]

  diagram: assets/diagrams/moqe.svg
  diagram_caption: "MoQE: frequency × sensitivity score assigns bit-widths per expert in MoE models."

