  tldr: >
    EXL2 is the quantization format native to the ExLlamaV2 inference engine. It extends
    GPTQ's approach with per-row bit-width assignment: different rows (output channels) of
    each weight matrix are quantized to different bit-widths (2–8), with the assignment
    determined by row-level Hessian importance. A target average bits-per-weight is specified,
    and the quantizer greedily assigns more bits to rows that suffer more from quantization.
    This makes EXL2 a "smooth" format — any target bpw from 2.0 to 8.0 in 0.05 steps is
    achievable, rather than the discrete jumps of W3/W4/W5.
  key_idea: >
    EXL2 quantization proceeds in two passes: (1) compute per-row Hessian importance scores
    (using the squared input activation norms, as in GPTQ), then assign bit-widths row-by-row
    using a greedy algorithm that maximizes quality for a given average bpw budget; (2) quantize
    each row to its assigned bit-width using GPTQ-style column-by-column second-order updates.
    At inference, ExLlamaV2's custom CUDA kernel handles the heterogeneous row precisions
    in a single kernel call, using a compact header per row that specifies its bit-width
    and group size. The result is smooth quality-vs-compression tradeoffs unavailable in
    fixed-format schemes.

