  precision: "W1A16 (sign + magnitude decomposition)"
  granularity: "sign matrix (1-bit) + magnitude vectors (FP16)"
  calibration: "knowledge distillation from FP16 model"
  symmetric: symmetric
  handles_outliers_via: "magnitude vectors capture scale information; distillation recovers quality"
  hardware_target: "GPU"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "approaches W4 PTQ quality at 1.5 effective bits with distillation"

  tldr: >
    OneBit decomposes each weight matrix W as W ≈ sign(W) · diag(v₁) · diag(v₂)^T where
    v₁ and v₂ are magnitude vectors (FP16). The sign matrix is stored at 1 bit; the two
    magnitude vectors are stored at full precision. This is a sign-value decomposition
    analogous to SVD-1 (rank-1 SVD) but in the sign domain. The magnitude vectors capture
    the scale information that binary weights cannot represent. Combined with knowledge
    distillation from the FP16 teacher, OneBit achieves quality close to W4 quantization
    at an effective bit-width of ~1.5 bits.
  key_idea: >
    Decompose W ∈ ℝ^{m×n} as W ≈ s₁ s₂ᵀ ⊙ B where B ∈ {-1,+1}^{m×n} is the sign matrix
    and s₁ ∈ ℝ^m, s₂ ∈ ℝ^n are per-row and per-column scale vectors. The storage cost is
    mn/8 bytes (sign matrix) + (m+n) × 2 bytes (scale vectors). For a 4096×4096 layer:
    2MB for signs + 32KB for scales ≈ 2.03MB total vs. 32MB for FP16 — about 15.7× compression.
