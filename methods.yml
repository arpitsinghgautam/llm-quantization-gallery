- id: pqcache
  name: PQCache
  full_name: "PQCache: Product Quantization-based KVCache for Long Context LLM Inference"
  category: kv_cache
  subcategory: product-quantization
  year: 2024
  date: 2024-07-17
  authors: ["Hailin Zhang", "Xiaodong Ji", "Yilin Chen", "Fangcheng Fu", "Xupeng Miao", "Xiaonan Nie", "Weipeng Chen", "Bin Cui"]
  affiliation: ["Peking University", "Baidu"]
