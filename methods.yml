  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl at W4A8 vs FP16 on LLaMA-3 family"

  tldr: >
    NVFP4 is NVIDIA's 4-bit floating-point format introduced for Blackwell-architecture GPUs.
    It uses E2M1 encoding (2 exponent bits, 1 mantissa, 1 sign bit = 4 bits total) and pairs
    each block of 16 consecutive weights with an FP8 block scale. This differs from MXFP4
    (blocks of 32, E8M0 scale) in having smaller blocks and a higher-precision (FP8) scale.
    NVFP4 with FP8 activation achieves very high throughput on Blackwell's native W4A8 Tensor
    Cores and is the primary quantization format for Blackwell inference.
  key_idea: >
    NVFP4 stores weights in 4 bits (E2M1 format: values from ±{0.5, 1.0, 1.5, 2.0, 3.0, 4.0, 6.0}).
    Every 16 consecutive weights share one FP8 block scale. At inference, weights are
    dequantized per block (multiply by FP8 scale) and the matmul proceeds with FP8/FP16
    activations. The combination of native Blackwell NVFP4 Tensor Cores and the compact
    4-bit format yields roughly 2× the effective throughput of FP8 inference at comparable
    quality, enabling LLaMA-3 70B and similar models to run at very high batch throughput.

