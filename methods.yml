- id: rtn
  name: RTN
  full_name: "Round-to-Nearest Quantization (baseline)"
  category: ptq_weight_only
  subcategory: baseline
  year: unknown
  date: unknown
  authors: []
  affiliation: []
  paper_url: null
  code_url: null
  blog_url: null
  venue: null

  precision: "W4A16"
  granularity: "per-channel or per-group (g=128 typical)"
  calibration: "none — weights only"
  symmetric: asymmetric
  handles_outliers_via: "none — no compensation mechanism"
  hardware_target: "any (no custom kernels required)"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "~1–3 ppl on LLaMA-7B at 4-bit; ~8–15 ppl at 3-bit (vs. FP16)"

  tldr: >
    Round-to-nearest is the simplest possible quantization strategy: compute a linear scale
    from the weight range, divide each weight by that scale, round to the nearest integer,
    and clip to the representable range. It requires no data, no calibration, and no compute
    beyond a single pass over the weights. It is the universal baseline against which all
    other methods are measured. At 4-bit it typically degrades perplexity by 1–3 points on
    LLaMA-scale models, and at 3-bit or below it degrades rapidly. Every method in this
    gallery claims to beat RTN at the same bit-width.
  key_idea: >
    Given a weight tensor W, compute s = (max(W) − min(W)) / (2^b − 1) for asymmetric
    quantization, then q = clip(round(W/s), 0, 2^b − 1). Dequantize as Ŵ = (q − z) × s.
    Granularity choices (per-tensor, per-channel, per-group) trade storage overhead for
    accuracy. Per-group with g=128 is the minimum quality bar for LLM deployment today.

  builds_on: []
  superseded_by: ["gptq", "awq", "hqq"]
  related: ["gptq", "awq", "owq"]

  diagram: assets/diagrams/rtn.svg
  diagram_caption: "Round-to-nearest: scale, round, clip — the universal baseline."

- id: gptq
  name: GPTQ
  full_name: "GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers"
  category: ptq_weight_only
  subcategory: second-order
  year: 2022
  date: 2022-10-31
  authors: ["Elias Frantar", "Saleh Ashkboos", "Torsten Hoefler", "Dan Alistarh"]
  affiliation: ["IST Austria", "ETH Zurich"]
  paper_url: https://arxiv.org/abs/2210.17323
  code_url: https://github.com/IST-DASLab/gptq
  blog_url: null
  venue: "ICLR 2023"

  precision: "W3/W4 A16"
  granularity: "per-column (output), group size 128 typical"
  calibration: "128 sequences × 2048 tokens, unlabeled"
  symmetric: asymmetric
  handles_outliers_via: "second-order (inverse Hessian) error compensation per column"
  hardware_target: "GPU; Marlin / ExLlamaV2 W4A16 kernels for fast inference"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl on LLaMA-7B at 4-bit; ~1–2 ppl at 3-bit (WikiText-2)"

  tldr: >
    GPTQ processes each transformer layer independently, using an approximate inverse Hessian
    of the layer's input to compensate for quantization error column-by-column. Quantizing
    one column introduces a residual error, which is immediately redistributed to the remaining
    unquantized columns via an OBS-style update. A careful column-ordering and a precomputed
    Cholesky factorization of the Hessian make the whole thing tractable in minutes per layer.
    GPTQ produced the kernel ecosystem (Marlin, ExLlamaV2) that most 4-bit open-weight LLM
    inference runs on today, and was the first method to make sub-4-bit quality practical
    at LLaMA scale.
  key_idea: >
    For each linear layer, GPTQ estimates H = 2 X Xᵀ (the expected squared input) as a proxy
    for the layer-wise loss Hessian. It then processes weight columns left-to-right:
    quantize column q to b bits, compute the residual error δq = (wq − ŵq), and propagate
    it to all remaining columns as Δ W[:,q+1:] -= δq · (H⁻¹[q, q+1:] / H⁻¹[qq]).
    The inverse Hessian is maintained via a blocked Cholesky factorization for numerical
    stability and cache efficiency. This is a direct application of the OBS (Optimal Brain
    Surgeon) framework to PTQ, applied layer-by-layer without any gradient computation.

  builds_on: ["obq", "obs"]
  superseded_by: []
  related: ["awq", "spqr", "quip", "owq"]

  diagram: assets/diagrams/gptq.svg
  diagram_caption: "Column-wise error compensation via inverse Hessian redistribution."

- id: obq
  name: OBQ
  full_name: "Optimal Brain Quantization"
  category: ptq_weight_only
  subcategory: second-order
  year: 2022
  date: 2022-08-15
  authors: ["Elias Frantar", "Dan Alistarh"]
  affiliation: ["IST Austria"]
  paper_url: https://arxiv.org/abs/2208.11580
  code_url: https://github.com/IST-DASLab/OBQ
  blog_url: null
  venue: "NeurIPS 2022"

  precision: "W3/W4 A16"
  granularity: "per-weight (unstructured)"
  calibration: "small calibration set"
  symmetric: asymmetric
  handles_outliers_via: "exact OBS second-order error propagation"
  hardware_target: "CPU / GPU (no sparse kernel advantage without sparsity support)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "better than RTN at equal bit-width; slower than GPTQ"

  tldr: >
    OBQ applies the Optimal Brain Surgeon (OBS) second-order framework to weight quantization:
    for each weight quantized, the residual quantization error is exactly absorbed by updating
    all remaining unquantized weights. This gives the theoretically best PTQ solution within
    a layer given an inverse Hessian, but is O(d³) per layer — impractical at LLM scale.
    GPTQ is a fast approximation of OBQ that sacrifices exact per-weight optimality for
    column-parallel processing, reducing complexity to O(d² × columns).
  key_idea: >
    For each weight wq selected for quantization, the OBS update is:
    δ W = −(wq − Q(wq)) / [H⁻¹]qq × H⁻¹[q, :].
    OBQ applies this exactly, in an order selected by minimum quantization error.
    The exact-order selection makes OBQ intractable at LLM scale (quadratic in the number
    of weights per row), but gives near-theoretical-optimal quality on small models.

  builds_on: ["obs"]
  superseded_by: ["gptq"]
  related: ["gptq", "spqr"]

  diagram: assets/diagrams/obq.svg
  diagram_caption: "Optimal Brain Surgeon applied per-weight with exact error propagation."

- id: awq
  name: AWQ
  full_name: "AWQ: Activation-aware Weight Quantization for LLM Compression and Acceleration"
  category: ptq_weight_only
  subcategory: activation-guided
  year: 2023
  date: 2023-06-01
  authors: ["Ji Lin", "Jiaming Tang", "Haotian Tang", "Shang Yang", "Wei-Ming Chen", "Wei-Chen Wang", "Guangxuan Xiao", "Xingyu Dang", "Chuang Gan", "Song Han"]
  affiliation: ["MIT", "MIT-IBM Watson AI Lab"]
  paper_url: https://arxiv.org/abs/2306.00978
  code_url: https://github.com/mit-han-lab/llm-awq
  blog_url: null
  venue: "MLSys 2024"

  precision: "W4A16"
  granularity: "per-group, g=128"
  calibration: "small activation sample (no labels required)"
  symmetric: asymmetric
  handles_outliers_via: "activation-magnitude-guided per-channel weight scaling before quantization"
  hardware_target: "GPU; TinyChat / AutoAWQ W4A16 kernels (CUDA, Metal)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.3 ppl on LLaMA-7B at 4-bit (WikiText-2)"

  tldr: >
    AWQ observes that not all weight channels are equally important — channels corresponding
    to high-magnitude activation dimensions cause disproportionately large quantization error.
    The solution is to scale those channels up by their activation magnitude (making them
    harder to quantize individually but reducing their contribution to output error), then
    divide the corresponding activation by the same scale to preserve mathematical equivalence.
    The scale can be found analytically or by a fast grid search. AWQ requires no Hessian
    computation and no per-weight optimization: it is one forward calibration pass plus
    a scale computation, making it much faster than GPTQ.
  key_idea: >
    For each linear layer, AWQ observes per-channel activation magnitudes s̃j = mean(|Xj|)
    and computes a scale factor sj = s̃j^α, where α ∈ [0,1] balances the difficulty between
    weights and activations. The transformation W' = W · diag(s) is applied to weights
    (scale up salient columns), and the inverse diag(s)⁻¹ is absorbed into the preceding
    layer (scale down the activations). The scaled W' is then quantized with standard RTN.
    The α parameter is found by a lightweight grid search minimizing layer-wise reconstruction
    loss. Because the scale is absorbed offline, inference overhead is zero.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["gptq", "owq", "spqr", "smoothquant"]

  diagram: assets/diagrams/awq.svg
  diagram_caption: "Activation-magnitude-guided channel scaling before standard quantization."

- id: spqr
  name: SpQR
  full_name: "SpQR: A Sparse-Quantized Representation for Near-Lossless LLM Weight Compression and Generation"
  category: ptq_weight_only
  subcategory: sparse-quantized
  year: 2023
  date: 2023-06-05
  authors: ["Tim Dettmers", "Ruslan Svirschevski", "Vage Egiazarian", "Denis Kuznedelev", "Elias Frantar", "Saleh Ashkboos", "Alexander Borzunov", "Torsten Hoefler", "Dan Alistarh"]
  affiliation: ["University of Washington", "IST Austria", "HSE University", "ETH Zurich"]
  paper_url: https://arxiv.org/abs/2306.03078
  code_url: https://github.com/Vahe1994/SpQR
  blog_url: null
  venue: "ICLR 2024"

  precision: "W3/W4 A16 (sparse overlay)"
  granularity: "per-group (dense part), unstructured sparse (sensitive weights)"
  calibration: "128 sequences, calibration for Hessian estimation"
  symmetric: asymmetric
  handles_outliers_via: "sensitive weights stored as FP16 sparse; density ~1% of weights"
  hardware_target: "GPU; requires sparse kernel support for the FP16 overlay"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1% relative perplexity increase at 3-bit on LLaMA-1-65B"

  tldr: >
    SpQR combines dense grouped quantization with a sparse FP16 overlay for the most
    sensitive weights. For each weight group, the Hessian-based sensitivity is computed,
    and the top ~1% of weights with the highest sensitivity score are extracted and stored
    in a sparse FP16 format alongside the quantized dense block. This lets SpQR achieve
    near-lossless 3-bit compression: the bulk of weights go to 3 bits, while a tiny fraction
    stay in FP16. The dense part is compatible with standard GPTQ-style quantization.
  key_idea: >
    SpQR extends GPTQ with a hybrid representation: each weight w_ij is scored by its
    sensitivity |∂²L/∂w_ij²| = [H]_{ii} / N (column Hessian diagonal). Weights with
    sensitivity above a threshold are stored as (index, FP16 value) sparse pairs;
    the rest are quantized to low bit-width with per-group scales. At inference, the
    sparse FP16 overlay is added on top of the dequantized dense matmul result.
    The overhead of the sparse overlay is negligible at 1% density, but its impact
    on quality is large since it captures the most error-sensitive weights.

  builds_on: ["gptq", "obq"]
  superseded_by: []
  related: ["squeezellm", "owq", "gptq"]

  diagram: assets/diagrams/spqr.svg
  diagram_caption: "Sensitive weights kept as FP16 sparse; rest quantized to INT3/INT4."

- id: squeezellm
  name: SqueezeLLM
  full_name: "SqueezeLLM: Dense-and-Sparse Quantization"
  category: ptq_weight_only
  subcategory: sparse-quantized
  year: 2023
  date: 2023-06-13
  authors: ["Sehoon Kim", "Coleman Hooper", "Amir Gholami", "Zhen Dong", "Xiuyu Li", "Sheng Shen", "Michael W. Mahoney", "Kurt Keutzer"]
  affiliation: ["UC Berkeley", "ICSI"]
  paper_url: https://arxiv.org/abs/2306.07629
  code_url: https://github.com/SqueezeAILab/SqueezeLLM
  blog_url: null
  venue: "ICML 2024"

  precision: "W4 A16 (sparse overlay)"
  granularity: "per-group (dense), unstructured sparse"
  calibration: "small calibration set for sensitivity"
  symmetric: asymmetric
  handles_outliers_via: "sensitivity-based sparse extraction + non-uniform k-means quantization"
  hardware_target: "GPU; custom sparse-dense kernel"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.1 ppl at 3-bit (LLaMA-7B vs FP16) with 0.45% sparse ratio"

  tldr: >
    SqueezeLLM uses the same dense-and-sparse decomposition strategy as SpQR but combines it
    with non-uniform (k-means) quantization for the dense part rather than uniform grid quantization.
    The most sensitive weights (by Fisher information / gradient covariance) are stored in a
    sparse FP16 matrix; the remaining weights are clustered using k-means, with each weight
    pointing to one of 2^b centroids stored in a look-up table. The non-uniform grid better
    captures the actual weight distribution, reducing error vs. uniform quantization at the
    same bit-width.
  key_idea: >
    Two components work together: (1) Sensitivity-guided sparse extraction — Fisher information
    S_ij = (∇_w L)² · f(H_ij) scores each weight; top-k% become sparse FP16.
    (2) Non-uniform k-means quantization of the dense remainder — instead of a linear scale,
    centroids are learned offline (2^b of them per group), and each weight is stored as a
    b-bit index into the centroid table. This is a form of scalar vector quantization.
    At inference, a custom CUDA kernel handles both the sparse lookup and the centroid
    dequantization in a single pass.

  builds_on: ["gptq", "rtn"]
  superseded_by: []
  related: ["spqr", "aqlm", "owq"]

  diagram: assets/diagrams/squeezellm.svg
  diagram_caption: "k-means non-uniform quantization + sensitivity-based sparse FP16 overlay."

- id: owq
  name: OWQ
  full_name: "OWQ: Outlier-Aware Weight Quantization for Efficient Fine-Tuning and Inference of Large Language Models"
  category: ptq_weight_only
  subcategory: outlier-aware
  year: 2023
  date: 2023-06-02
  authors: ["Changhun Lee", "Jungyu Jin", "Taesu Kim", "Hyungjun Kim", "Eunhyeok Park"]
  affiliation: ["Pohang University of Science and Technology (POSTECH)"]
  paper_url: https://arxiv.org/abs/2306.02272
  code_url: https://github.com/xvyaward/owq
  blog_url: null
  venue: "AAAI 2024"

  precision: "W3/W4 A16 (mixed)"
  granularity: "per-column (most), per-weight FP16 for sensitive"
  calibration: "calibration set for Hessian column norms"
  symmetric: asymmetric
  handles_outliers_via: "Hessian-norm-ranked weight columns kept at FP16 (mixed precision)"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl at 3-bit LLaMA-7B with ~0.1% FP16 columns"

  tldr: >
    OWQ identifies the weight columns whose quantization errors propagate most destructively
    to the output — those corresponding to large-magnitude activation channels — and keeps
    them in FP16, quantizing everything else to low bits. This is complementary to SpQR:
    OWQ works at the column level (keeping entire columns at FP16) rather than individual
    weight sensitivity. The column selection criterion is the Hessian diagonal [H]_jj
    (the squared input activation norm for column j), which captures how much quantizing
    column j would affect the output.
  key_idea: >
    For each linear layer, compute the Hessian diagonal [H]_jj = E[x_j²] (mean squared
    activation for input channel j). Columns j with the largest [H]_jj values are the
    most sensitive; the top few percent are kept at FP16 while the rest are quantized
    to W3 or W4 with GPTQ-style second-order correction. A small number of FP16 columns
    (0.1–0.3%) provides a large quality recovery because the outlier channels (which
    exist in the same positions across all tokens for large LLMs) are fully preserved.

  builds_on: ["gptq", "rtn"]
  superseded_by: []
  related: ["spqr", "gptq", "awq"]

  diagram: assets/diagrams/owq.svg
  diagram_caption: "Hessian-ranked column selection: top columns stay FP16, rest go INT3/4."

- id: quip
  name: QuIP
  full_name: "QuIP: 2-Bit Quantization of Large Language Models With Guarantees"
  category: ptq_weight_only
  subcategory: incoherence-processing
  year: 2023
  date: 2023-07-25
  authors: ["Jerry Chee", "Yaohui Cai", "Volodymyr Mnih", "Christopher De Sa"]
  affiliation: ["Cornell University", "Google DeepMind"]
  paper_url: https://arxiv.org/abs/2307.13304
  code_url: https://github.com/jerry-chee/QuIP
  blog_url: null
  venue: "NeurIPS 2023"

  precision: "W2/W4 A16"
  granularity: "per-group after rotation"
  calibration: "calibration set for Hessian and rotation"
  symmetric: symmetric
  handles_outliers_via: "random orthogonal pre/post-rotation to spread outliers uniformly"
  hardware_target: "GPU (custom dequantization kernels needed for rotation)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl at 2-bit LLaMA-2-7B vs. previous 2-bit methods (large improvement)"

  tldr: >
    QuIP is the first method to achieve practical 2-bit LLM quantization with theoretical
    guarantees. The key insight is "incoherence processing": by multiplying weights and
    calibration inputs by a random orthogonal matrix before quantization (and the inverse
    after), the weight distribution becomes nearly Gaussian with no outliers, allowing
    simple uniform quantization to work well even at 2 bits. The quality improvement is
    dramatic — 2-bit QuIP outperforms all prior 2-bit methods by a large margin.
  key_idea: >
    The weight matrix W is transformed as W̃ = U W Vᵀ where U and V are random orthogonal
    matrices (pre- and post-multiplication). An orthogonal transformation doesn't change
    the Frobenius norm of the error, but it makes the error more uniform across entries,
    reducing the maximum individual error from O(√d) to O(1). This "incoherence" property
    allows uniform scalar quantization of W̃ to work well. At inference, inputs are also
    pre-multiplied by V and the output is post-multiplied by Uᵀ. QuIP also includes a
    greedy coordinate descent (LDLQ) step to further reduce quantization error.

  builds_on: ["gptq", "obq"]
  superseded_by: ["quip-sharp"]
  related: ["quip-sharp", "quarot", "spinquant", "gptq"]

  diagram: assets/diagrams/quip.svg
  diagram_caption: "Random orthogonal rotation makes weights incoherent; uniform quantization then works at 2-bit."

- id: quip-sharp
  name: QuIP#
  full_name: "QuIP#: Even Better LLM Quantization with Hadamard Incoherence and Lattice Codebooks"
  category: ptq_weight_only
  subcategory: incoherence-processing
  year: 2024
  date: 2024-02-07
  authors: ["Albert Tseng", "Jerry Chee", "Qingyao Sun", "Volodymyr Mnih", "Christopher De Sa"]
  affiliation: ["Cornell University", "Google DeepMind"]
  paper_url: https://arxiv.org/abs/2402.04396
  code_url: https://github.com/Cornell-RelaxML/quip-sharp
  blog_url: null
  venue: "NeurIPS 2024"

  precision: "W2/W3/W4 A16"
  granularity: "per 8-element block (E8 lattice)"
  calibration: "calibration set"
  symmetric: symmetric
  handles_outliers_via: "Hadamard incoherence + E8 lattice vector quantization"
  hardware_target: "GPU (custom CUDA kernels for E8 decode)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "2-bit LLaMA-2-7B approaches full-precision quality; best known 2-bit PTQ"

  tldr: >
    QuIP# extends QuIP with two key improvements: replacing random orthogonal rotations
    with Hadamard matrices (which are fast to compute and hardware-friendly), and replacing
    scalar uniform quantization with vector quantization using the E8 lattice codebook.
    The E8 lattice is the densest known 8-dimensional integer lattice; using it as a
    codebook allows more efficient representation of 8 values simultaneously than 8
    independent scalar quantizations. Together, these make QuIP# the best-known 2-bit
    PTQ method as of 2024, achieving near-FP16 perplexity at 2 bits on LLaMA-2 scale.
  key_idea: >
    Two innovations over QuIP: (1) Hadamard incoherence — using a randomized Hadamard
    transform H (with random sign flips) instead of dense random orthogonal matrices;
    Hadamard transforms are O(n log n) instead of O(n²) and can be fused with matrix
    multiplications. (2) E8 lattice codebooks — groups of 8 weights are jointly
    quantized to the nearest point in the E8 lattice (scaled by a per-group scale),
    achieving the theoretical lower bound on quantization error for nearly-Gaussian
    distributions in 8D. At 2 bits (E8P codebook, 2 bits/weight), ppl of LLaMA-2-7B
    on WikiText-2 drops to ~6.5 vs. FP16 ~5.5 — within 1 point.

  builds_on: ["quip", "gptq"]
  superseded_by: []
  related: ["aqlm", "quip", "quarot"]

  diagram: assets/diagrams/quip-sharp.svg
  diagram_caption: "Hadamard incoherence + E8 lattice vector quantization for 2-bit PTQ."

- id: aqlm
  name: AQLM
  full_name: "Extreme Compression of Large Language Models via Additive Quantization"
  category: ptq_weight_only
  subcategory: vector-quantization
  year: 2024
  date: 2024-01-11
  authors: ["Vage Egiazarian", "Andrei Panferov", "Denis Kuznedelev", "Elias Frantar", "Artem Babenko", "Dan Alistarh"]
  affiliation: ["IST Austria", "Yandex", "HSE University"]
  paper_url: https://arxiv.org/abs/2401.06118
  code_url: https://github.com/Vahe1994/AQLM
  blog_url: null
  venue: "ICML 2024"

  precision: "W2 A16 (avg ~2 bits)"
  granularity: "per 8-weight group via additive codebook"
  calibration: "calibration set for codebook learning (beam search)"
  symmetric: "n/a (codebook-based)"
  handles_outliers_via: "multi-codebook additive representation absorbs all magnitudes"
  hardware_target: "GPU (custom CUDA kernel for codebook decode)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "LLaMA-2-7B at 2 bits: ~6.7 ppl vs 5.5 FP16 — best among 2-bit PTQ at time of release"

  tldr: >
    AQLM applies additive quantization (from the image/audio compression literature) to LLM
    weights. Each group of 8 weights is represented as a sum of M codebook entries
    (M=1 or 2 in practice), where each codebook has 2^b entries. With M=2 codebooks of
    256 entries each, 8 weights are stored as 2 bytes of indices plus the shared codebooks,
    achieving approximately 2 bits per weight. Learned via a beam-search optimization that
    jointly minimizes layer-wise reconstruction error, AQLM achieves state-of-the-art
    2-bit quality among PTQ methods and outperforms QuIP# on several model families.
  key_idea: >
    Each weight block w ∈ ℝ⁸ is approximated as ŵ = Σ_{m=1}^{M} C_m[i_m], where C_m
    are learned codebooks of shape (K, 8) and i_m is a learned integer index.
    With M=2, K=256: total bits = 2 × log₂(256) = 16 bits for 8 weights = 2 bits/weight.
    Codebooks are learned by alternating between fixing codes and updating codebooks
    (via least-squares) and fixing codebooks and updating codes (via beam search).
    The layer-wise reconstruction loss is minimized as in GPTQ. AQLM also supports
    a fine-tuning step to further close the gap with FP16.

  builds_on: ["gptq", "obq"]
  superseded_by: []
