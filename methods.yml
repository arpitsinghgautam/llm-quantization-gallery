  precision: "W16A16KV4 (with head-dimension pruning)"
  granularity: "per-head, structured (channel pruning within head dimension)"
  calibration: "none"
  symmetric: asymmetric
  handles_outliers_via: "query-driven pruning removes low-attention key dimensions"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.5 ppl at 25% key cache reduction + INT4 quantization"

  tldr: >
    ThinK takes a different approach to KV cache compression: instead of quantizing all
    elements of the K cache, it prunes specific dimensions (channels) of the key vectors
    that contribute least to the query-key dot product. The importance of each key dimension
    is estimated from the query vectors — dimensions where Q·K correlates poorly across
    queries are pruned. This "thinner K" approach is combined with quantization of the
    retained dimensions, compressing the K cache in two orthogonal ways: fewer dimensions
    (pruning) and fewer bits per dimension (quantization).
  key_idea: >
    For head h with queries Q ∈ ℝ^{T_q × d} and keys K ∈ ℝ^{T_k × d}, compute the
    per-dimension importance score: I_j = ‖ Q_j ⊙ K_j ‖ (element-wise product of the
    j-th query and key dimension, summed over all heads and tokens). Low-importance
    dimensions (low I_j) contribute little to the attention score and can be pruned.
    Pruning removes the bottom-p% of key dimensions. The corresponding query dimensions
    are also zeroed to maintain attention correctness. Combined with INT4 quantization
    of the retained (d × (1-p)) key dimensions, ThinK achieves up to 25% fewer key
    cache bytes without quality degradation.

