- id: smoothquant
  name: SmoothQuant
  full_name: "SmoothQuant: Accurate and Efficient Post-Training Quantization for Large Language Models"
  category: ptq_weight_activation
  subcategory: scale-migration
  year: 2022
  date: 2022-11-17
  authors: ["Guangxuan Xiao", "Ji Lin", "Mickael Seznec", "Hao Wu", "Julien Demouth", "Song Han"]
  affiliation: ["MIT", "NVIDIA"]
  paper_url: https://arxiv.org/abs/2211.10438
  code_url: https://github.com/mit-han-lab/smoothquant
  blog_url: null
  venue: "ICML 2023"

  precision: "W8A8"
  granularity: "per-channel (weights, after scaling); per-token (activations, after scaling)"
  calibration: "small calibration set for activation statistics"
  symmetric: symmetric
  handles_outliers_via: "per-channel scale migration: diag(s) absorbed into weight; diag(s)⁻¹ applied to activation"
  hardware_target: "NVIDIA GPU (INT8 Tensor Cores); 1.56× speedup on A100"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.5 ppl on OPT-175B/LLaMA at W8A8"

  tldr: >
    SmoothQuant addresses the fundamental difficulty of activation quantization: the presence
    of large per-channel outliers that dominate the dynamic range. The insight is that outliers
    are systematic (always in the same channels across all tokens), so we can "smooth" them away
    by multiplying each activation channel by its inverse scale and multiplying the corresponding
    weight column by the same scale — an operation that is mathematically equivalent to the
    original matmul but redistributes the quantization difficulty from activations (which vary
    token-to-token) to weights (which are static). The per-channel weight scales are absorbed
    into the preceding LayerNorm, so they are free at inference time.
  key_idea: >
    For each linear layer, compute per-channel activation scales as s_j = max_t(|X_{t,j}|)^α /
    max_k(|W_{j,k}|)^{1-α} where α=0.5 balances difficulty equally. Apply the transformation:
    X' = X · diag(s)⁻¹ and W' = diag(s) · W. Both X' and W' can then be quantized to INT8
    per-token and per-channel respectively with much smaller quantization error.
    The scales are pre-absorbed into the preceding LayerNorm's weight and bias, meaning
    the smooth transform has no runtime cost. W8A8 INT8 matmul on Tensor Cores then
    provides actual speedup (not just memory savings).

  builds_on: ["llm-int8", "rtn"]
  superseded_by: []
  related: ["zeroquant", "atom", "quarot", "spinquant"]

  diagram: assets/diagrams/smoothquant.svg
  diagram_caption: "Scale migration: diag(s) moves from activations to weights, equalizing quantization difficulty."

