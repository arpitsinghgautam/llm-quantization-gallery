    statistics from the calibration set; (2) compute optimal per-channel scales (the α
    parameter in AWQ); (3) apply the scale transformation to weights and absorb the
    inverse into preceding layers; (4) quantize scaled weights with RTN at group size 128.
    The resulting model is saved in AWQ format with per-group scale factors and zero points
