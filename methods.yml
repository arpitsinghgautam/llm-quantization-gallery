  handles_outliers_via: "learned affine (scale + shift) equivalent transformation for both weights and activations"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl W4A4 LLaMA-2-7B, competitive with rotation methods"

  tldr: >
    AffineQuant learns per-channel affine transformations (scale + shift, not just scale)
    for both weights and activations to minimize the combined quantization error. Unlike
    SmoothQuant (scale only) or rotation methods (orthogonal matrices), AffineQuant's
    per-channel shift is a genuine additional degree of freedom that can center asymmetric
    distributions. The transformations are equivalent (absorbed into surrounding layers),
    and the shift absorbed into bias vectors provides centering at no inference cost.
  key_idea: >
    For a linear layer Y = XW + b, AffineQuant parameterizes a per-channel transformation
    as X' = (X + α) · β, where α is a per-channel shift and β is a per-channel scale.
    The inverse transformation (−α/β, 1/β) is absorbed into W and b via equivalent
    weight transformation, leaving the model output unchanged. Both α and β are optimized
    by minimizing the block-wise reconstruction loss using gradient descent on the
    calibration set. The extra shift parameter (vs. SmoothQuant which only learns β)
    allows centering channels that have non-zero mean outliers — common in post-attention
    activations of larger LLMs.

  builds_on: ["smoothquant", "omniquant"]
  superseded_by: []
  related: ["smoothquant", "omniquant", "flatquant"]

