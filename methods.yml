  affiliation: ["University of Washington", "Meta AI"]
  paper_url: https://arxiv.org/abs/2208.07339
  code_url: https://github.com/bitsandbytes-foundation/bitsandbytes
  blog_url: null
  venue: "NeurIPS 2022"

  precision: "W8A8 (with FP16 outlier decomposition)"
  granularity: "per-column (weights), per-token (activations)"
  calibration: "none — threshold is fixed at 6.0"
  symmetric: symmetric
  handles_outliers_via: "outlier channels isolated and computed in FP16; rest in INT8"
  hardware_target: "NVIDIA GPU (CUDA INT8 cublas / bitsandbytes kernels)"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 1% perplexity increase on OPT/BLOOM/LLaMA at 8-bit"

  tldr: >
    LLM.int8() was the first practical INT8 inference method for LLMs that does not
    degrade perplexity. The key observation is that, in models with more than ~6.7B parameters,
    a small set of activation channels (about 0.1%) contain systematic outliers that are
    10–100× larger than the rest. Quantizing these channels to INT8 causes catastrophic error.
    LLM.int8() avoids this by decomposing the matrix multiplication: outlier columns of the
    input are extracted and computed in FP16 while all other columns go through INT8 matmul.
    The two partial results are summed in FP16. This halves the memory usage of a 7B+ model
    while preserving quality.
  key_idea: >
    Given input X ∈ ℝ^{T×d} and weight W ∈ ℝ^{d×d'}, LLM.int8() identifies columns j of X
    where |X_{t,j}| > 6 for any token t. These "outlier" columns (and corresponding rows of W)
    are extracted: X_out ∈ ℝ^{T×k} and W_out ∈ ℝ^{k×d'}. The non-outlier part uses
    per-token (row) scales for X and per-column scales for W to fit both into INT8,
    and computes W_int · X_int in INT8. Results are dequantized and summed:
    Y = X_out · W_out (FP16) + dequant(X_int · W_int). This is exact decomposition —
    the two contributions recover the original matmul result.

  builds_on: ["rtn"]
  superseded_by: ["smoothquant"]
