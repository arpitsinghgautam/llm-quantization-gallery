  requires_training: false
  requires_calibration_data: false
  typical_degradation: "near-lossless at KV4 with low-rank residual; outperforms KIVI at same bit-width"

  tldr: >
    GEAR combines KV-cache quantization with a learned low-rank residual correction to
    compensate for quantization error. The idea is to decompose the KV cache as:
    KV ≈ Q(KV) + low_rank_correction, where the low-rank correction captures the
    systematic (structured) part of the quantization error. The rank-r correction
    requires only 2 × r × d_head parameters per layer (instead of 2 × T × d_head for the
    full KV), providing significant compression with minimal accuracy loss.
  key_idea: >
    GEAR's decomposition: KV = Q(KV) + L R^T + Sparse, where Q(KV) is the INT4 quantized
    cache, L ∈ ℝ^{T×r} and R ∈ ℝ^{d×r} are the low-rank residual factors, and Sparse
    captures outlier entries. The low-rank factors are computed online from the quantization
    error matrix E = KV − Q(KV) via a fast streaming SVD that is maintained incrementally
    as new tokens arrive. The sparse component captures the top-k% largest errors after
    the low-rank correction. At attention, Q(KV) + L R^T is used, with the sparse
    correction added for outlier positions only.

