- id: qtip
  name: QTIP
  full_name: "QTIP: Quantization with Trellises and Incoherence Processing"
  category: ptq_weight_only
  subcategory: trellis-codebook
  year: 2024
  date: 2024-06-17
  authors: ["Albert Tseng", "Qingyao Sun", "David Hou", "Christopher De Sa", "Volodymyr Kuleshov"]
  affiliation: ["Cornell University"]
  paper_url: https://arxiv.org/abs/2406.11811
  code_url: https://github.com/Cornell-RelaxML/qtip
  blog_url: null
  venue: "NeurIPS 2024"
  precision: "W2 A16"
  granularity: "per-group with trellis codebook"
  calibration: "small calibration set for Hessian"
  symmetric: symmetric
  handles_outliers_via: "incoherence processing (Hadamard rotation) before trellis coding"
  hardware_target: "GPU; custom CUDA trellis decode kernel"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 0.3 ppl vs FP16 at W2 on LLaMA-2-70B"
  tldr: >
    QTIP pushes 2-bit weight quantization to near-lossless quality by combining
    incoherence processing (random Hadamard rotation) with trellis-coded quantization
    — a sequence-modeling approach that codes runs of weights jointly rather than
    independently. The trellis codebook captures inter-weight correlations within a
    group, yielding significantly better rate-distortion than per-weight scalar
    codebooks. QTIP achieves state-of-the-art 2-bit results on LLaMA-2 70B with
    perplexity within 0.3 of FP16.
  key_idea: >
    After rotating weights with a random Hadamard matrix, QTIP applies trellis-coded
    quantization: dynamic programming treats the weight sequence as a Markov chain and
    finds the joint quantization minimizing total squared error across the group. This
    is analogous to Viterbi decoding on a trellis. Results are stored as trellis-state
    indices decoded at inference via a fast CUDA kernel. Builds on QuIP# incoherence
    preprocessing and adds sequence-level coding on top.
  builds_on: ["quip-sharp", "quip", "gptq"]
  superseded_by: []
  related: ["quip-sharp", "aqlm", "hqq"]
  diagram: assets/diagrams/qtip.svg
  diagram_caption: "QTIP: Hadamard rotation + trellis-coded joint quantization over weight sequences."

- id: snapkv
  name: SnapKV
  full_name: "SnapKV: LLM Knows What You are Looking for Before Generation"
  category: kv_cache
  subcategory: eviction
  year: 2024
  date: 2024-04-18
  authors: ["Yuhong Li", "Yingbing Huang", "Bowen Yang", "Bharat Venkitesh", "Acyr Locatelli", "Hanchen Ye", "Tianle Cai", "Patrick Lewis", "Deming Chen"]
  affiliation: ["University of Illinois Urbana-Champaign", "Cohere", "Princeton University"]
  paper_url: https://arxiv.org/abs/2404.14469
  code_url: https://github.com/FasterDecoding/SnapKV
  blog_url: null
  venue: "NeurIPS 2024"
  precision: "KV selective eviction (variable effective bits)"
  granularity: "per-head, observation-window based"
  calibration: "none"
  symmetric: symmetric
  handles_outliers_via: "preserves high-attention tokens; evicts low-attention ones"
  hardware_target: "GPU; compatible with FlashAttention"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 1% on long-context QA; 3.6x KV cache reduction at 16K context"
  tldr: >
    SnapKV identifies which past KV entries each attention head actually uses by
    examining attention patterns over a short observation window of recent tokens.
    Only high-attention tokens are kept; the rest are evicted. This is a tuning-free,
    plug-and-play approach compatible with FlashAttention, achieving 3.6x KV cache
    reduction at 16K context with minimal accuracy loss and no model changes required.
  key_idea: >
    For each head, SnapKV accumulates attention scores over the last W tokens (the
    observation window, default 32-64 tokens). Past tokens receiving high cumulative
    attention score are retained; others are evicted. The surviving KV cache is
    concatenated with the full observation-window KV cache (always preserved), ensuring
    recent context is never dropped. Unlike quantization methods, SnapKV reduces the
    number of stored tokens rather than their bit-width.
  builds_on: []
  superseded_by: []
  related: ["kvquant", "kivi", "think", "gear", "zipcache"]
  diagram: assets/diagrams/snapkv.svg
  diagram_caption: "SnapKV: observation-window attention selects which past KV entries to retain."

