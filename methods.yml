  tldr: >
    vLLM is the dominant open-source LLM serving framework for production deployment,
    built around PagedAttention for efficient KV cache management. Its quantization support
    includes native GPTQ (Triton kernel), AWQ (custom CUDA), Marlin (high-throughput W4A16),
    FP8 (H100), GGUF (partial), and INT8. vLLM's quantization handling is transparent to
    the user — load a pre-quantized model and vLLM selects the appropriate kernel. The
    Marlin backend (IST-DASLab) gives near-theoretical memory bandwidth for W4A16 decoding
    at batch=1, while FP8 on H100 gives compute-bound throughput for large batches.
  key_idea: >
    vLLM's quantization stack is a collection of backend kernels selected by model format:
    GPTQ → Triton kernel (or Exllama2 backend); AWQ → custom fused CUDA; W4A16 → Marlin;
    FP8 → H100 FP8 Tensor Core kernel; INT8 SmoothQuant → INT8 GEMM. PagedAttention
    manages KV cache in fixed-size 16-token blocks, enabling non-contiguous KV allocation
    and serving many concurrent requests without memory fragmentation. Continuous batching
    iterates over requests at the token level, maximizing GPU utilization. All quantization
    kernels plug into this serving infrastructure.

