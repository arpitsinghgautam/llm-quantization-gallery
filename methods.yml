  typical_degradation: "better than QLoRA at low LoRA rank; adapter merges cleanly into quantized model"

  tldr: >
    QA-LoRA identifies a problem with QLoRA: when the LoRA adapters are merged back into
    the base model after fine-tuning, the merged weights are no longer well-fit by the
    original quantization grid. QA-LoRA rethinks the adapter design so that the merged
    (adapter + quantized base) can be re-quantized cleanly: adapters are designed to
    be absorbed into the group-wise quantization parameters (scale + zero-point) rather
    than added as a separate floating-point correction. The result is a merged quantized
    model that is properly quantized after fine-tuning, enabling clean deployment without
    a separate re-quantization step.
  key_idea: >
    In QA-LoRA, LoRA adapters are applied per-group: each rank-r adapter acts on a
    group of g weight elements, modifying the effective group scale and zero-point.
    The adapter output B·A is added to the group-level dequantization of Q(W_group),
    and since B·A is low-rank across the group dimension, it can be absorbed into the
    group-wise quantization parameters after fine-tuning. The number of parameters per
    adapter is r × (g_in + g_out) per group — small and proportional to the group size
    rather than the full channel count.

