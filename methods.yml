  hardware_target: "GPU"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "best-known W2A16 QAT result; competitive with PTQ at W4"

  tldr: >
    EfficientQAT proposes a two-stage block-wise quantization-aware training pipeline that
    makes end-to-end QAT of 70B+ parameter models tractable. Stage 1: block-wise QAT —
    each transformer block is QAT-tuned independently (with the rest frozen) on a large
    text corpus, using the STE. Stage 2: end-to-end QAT — a lightweight global fine-tuning
    pass refines all blocks jointly. By decoupling the block-wise stage (which is easily
    parallelizable), EfficientQAT scales to large models without requiring full-model QAT
    from the start, and achieves state-of-the-art W2 quality among QAT methods.
  key_idea: >
    Stage 1 (block-wise QAT): for each block i, freeze all other blocks and optimize the
    quantized block with STE on the standard LM loss using block-local inputs (from the
    frozen preceding blocks). This is embarrassingly parallel across blocks. The quantized
    weights evolve via: w_q ← STE_grad(L_block(w_q)) where STE passes the gradient through
    the round operation. Stage 2 (end-to-end fine-tuning): with all blocks initialized from
    Stage 1, run a short global QAT pass on the full model. The sequential dependency makes
    Stage 2 important for cross-block error compensation, but it is short because Stage 1
    already provides a good starting point.

  builds_on: ["llm-qat", "gptq"]
  superseded_by: []
