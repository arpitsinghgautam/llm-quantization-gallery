  precision: "W1A8"
  granularity: "per-tensor (weights); per-token (activations)"
  calibration: "training from scratch"
  symmetric: symmetric
  handles_outliers_via: "training from scratch; absmax weight normalization before binarization"
  hardware_target: "custom hardware / CPU (no native 1-bit GPU support)"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "lags FP16 at same parameter count; scales to close the gap; requires more params"

  tldr: >
    BitNet proposes training LLMs with binary ({-1, +1}) weight matrices from scratch, with
    8-bit activations. All weight matrices in the transformer (attention projections, FFN
    weights) are replaced with "BitLinear" layers that store weights as binary and apply
    a per-tensor scale at dequantization. Training uses the STE to propagate gradients
    through the binary step. BitNet is the first to show that billion-scale LLMs can be
    trained with 1-bit weights without catastrophic collapse — the key is training from
    scratch rather than post-hoc binarization.
  key_idea: >
    Each weight w in a BitLinear layer is binarized as: b = sign(w), and a per-tensor
    scale α = mean(|W|) is stored. During forward pass: y = Q_act(x) · (b · α) where
    Q_act is INT8 activation quantization. Gradients backprop through b via STE:
    ∂L/∂w ≈ ∂L/∂b (treating sign as identity). The absmax normalization before
    binarization (w̃ = w / max(|w|)) ensures the binary weights are ±1 symmetrically.
    LayerNorm before each BitLinear layer is critical to make activation distributions
    more Gaussian and INT8-quantizable. Training with this setup scales to 30B parameters.

  builds_on: []
  superseded_by: ["bitnet-b158"]
  related: ["bitnet-b158", "onebit", "billm"]

