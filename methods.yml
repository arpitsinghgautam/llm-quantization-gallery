- id: obs
  name: OBS
  full_name: "Optimal Brain Surgeon and General Network Pruning"
  category: ptq_weight_only
  subcategory: foundational
  year: 1993
  date: 1993-01-01
  authors: ["Babak Hassibi", "David G. Stork", "Gregory J. Wolff"]
  affiliation: ["Ricoh California Research Center", "Stanford University"]
  paper_url: https://authors.library.caltech.edu/55952/1/Optimal%20Brain%20Surgeon.pdf
  code_url: null
  blog_url: null
  venue: "NeurIPS 1992"

  precision: "n/a (pruning framework; later adapted to quantization)"
  granularity: "per-weight"
  calibration: "training data (Hessian computed during training)"
  symmetric: "n/a"
  handles_outliers_via: "second-order Taylor expansion; exact error propagation"
  hardware_target: "n/a (algorithm, not LLM-specific)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "n/a"

  tldr: >
    Optimal Brain Surgeon (OBS) is the classical second-order framework for weight pruning
    (and later, quantization). It computes, for each weight w_q, the increase in training
    loss from removing or changing that weight, using the full Hessian of the loss. After
    removing/changing weight q, OBS updates all remaining weights to minimize the resulting
    error: Δw = −(w_q / [H⁻¹]_qq) × H⁻¹[q, :]. This exact second-order compensation
    is the theoretical foundation for GPTQ, OBQ, and all subsequent Hessian-based
    quantization methods.
  key_idea: >
    For a network with loss L(w) ≈ L(w₀) + ½(w−w₀)^T H (w−w₀), removing weight w_q
    introduces error δL = w_q² / (2[H⁻¹]_qq). The optimal compensation update for the
    remaining weights is Δw = −(w_q / [H⁻¹]_qq) × H⁻¹[:, q]. OBS generalizes this to
    quantization: setting w_q to its quantized value ŵ_q (instead of zero) introduces
    error (w_q − ŵ_q)² / (2[H⁻¹]_qq), and the same Hessian update compensates.
    The key computational challenge is inverting H, which is O(d³) — the bottleneck
    that GPTQ and OBQ address with approximations.

  builds_on: []
  superseded_by: []
  related: ["obq", "gptq"]

  diagram: assets/diagrams/obs.svg
  diagram_caption: "OBS: second-order weight change formulation and exact Hessian-based compensation."

