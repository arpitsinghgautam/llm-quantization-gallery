  granularity: "per-channel (with sliding window for online statistics)"
  calibration: "none (online)"
  symmetric: asymmetric
  handles_outliers_via: "clipped quantization; sliding window maintains fresh statistics for accurate scale computation"
  hardware_target: "GPU"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.5 ppl at KV4; competitive with KIVI at KV2 without calibration"

  tldr: >
    SKVQ tackles the challenge that KV cache quantization must work online — quantization
    parameters cannot be computed from future tokens. Naive online quantization suffers from
    stale statistics: the quantization scale computed at token 1 may be wrong at token 1000
    if the KV distribution drifts. SKVQ uses a sliding window of the most recent W tokens
    to maintain fresh, locally-relevant statistics for the quantization scale, balancing
    between always-fresh (expensive) and never-updated (stale) approaches.
  key_idea: >
    For each KV head, maintain a sliding window of the W most recent raw (FP16) KV vectors.
    Compute the quantization scale from this window: s = max(|K_{t-W:t}|) / 127.
    Apply this scale to quantize the current K_t. As the window slides forward, the old
    quantized values are not re-quantized (too expensive), but new tokens use the fresh
    window scale. The window size W is a hyperparameter balancing freshness (smaller W)
    against scale stability (larger W). Additionally, SKVQ applies channel-aware clipping
    based on the long-run statistics of each K head channel to prevent outliers from
    inflating the window scale.

  builds_on: ["kivi", "rtn"]
