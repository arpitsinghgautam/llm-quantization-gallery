  tldr: >
    ZeroQuant-FP explores using floating-point formats (FP4 for weights, FP8 for activations)
    instead of integer formats in the ZeroQuant framework. The key finding is that for activations
    — which have approximately log-normal distributions with large dynamic range — FP8 (E4M3 or E5M2)
    significantly outperforms INT8 at the same bit-width because the non-uniform floating-point
    grid better covers the tails. For weights (approximately normally distributed), FP4 also
    outperforms INT4 due to the same effect. This paper motivated the adoption of FP8 in
    subsequent hardware (H100 Tensor Cores) and training frameworks.
  key_idea: >
    For activations quantized per-token, FP8 E4M3 (4 exponent bits, 3 mantissa) covers a
    large dynamic range (up to ~448) while still providing fine precision near zero,
    matching the log-normal activation distribution better than INT8's uniform grid.
    For weights per-group, FP4 E2M1 (2 exponent bits, 1 mantissa) outperforms INT4 for
    the same reason. The framework computes per-tensor or per-token scale factors and
    maps values to the nearest FP4/FP8 code. On H100 with native FP8 Tensor Cores,
    FP8 activation quantization achieves actual throughput gains.

  builds_on: ["zeroquant-v2", "zeroquant"]
  superseded_by: []
  related: ["atom", "fp8-training", "smoothquant"]

  diagram: assets/diagrams/zeroquant-fp.svg
