  precision: "W2 A16"
  granularity: "vector quantization (codebook-based)"
  calibration: "fine-tuning data"
  symmetric: "n/a (codebook-based)"
  handles_outliers_via: "vector quantization codebook absorbs all magnitudes; proximal gradient update"
  hardware_target: "GPU"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "best-known 2-bit quantized fine-tuning quality as of mid-2024"

  tldr: >
    PV-Tuning addresses the poor convergence of STE at extreme compression (2-bit vector
    quantization). The STE approximation (treating the quantization round as the identity
    during backpropagation) becomes severely wrong at 2-bit because the quantization
    distortion is large. PV-Tuning instead formulates the optimization as a proximal gradient
    descent over discrete codebook assignments: at each step, the gradient update suggests
    a direction; then a discrete projection finds the nearest valid quantized assignment.
    This avoids the STE altogether and works even with vector-quantized (AQLM-style) weights.
  key_idea: >
    For a vector-quantized weight block w = C[i] (codebook entry), PV-Tuning updates the
    codebook assignment by: (1) compute the continuous gradient ∇_{w} L as if w were free;
    (2) find the nearest codebook entry to w − lr·∇L. This is a proximal step on the
    discrete set of codebook entries. The key insight is that for discrete quantization,
    the proximal step (find nearest quantized point) is the exact discrete projection,
    not an approximation like STE. Combined with a codebook update step (re-optimize centroids
    given fixed assignments via least squares), PV-Tuning jointly optimizes both the
    codebook and assignments — effectively a quantized version of coordinate descent.

  builds_on: ["aqlm", "llm-qat"]
  superseded_by: []
  related: ["aqlm", "efficientqat", "bitdistiller"]

  diagram: assets/diagrams/pv-tuning.svg
  diagram_caption: "Proximal gradient on discrete codebook assignments avoids STE; finds nearest valid code."

