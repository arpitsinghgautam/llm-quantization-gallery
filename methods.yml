  tldr: >
    WKVQuant jointly optimizes weight and KV-cache quantization, observing that
    weight and KV quantization errors interact during generation: a quantized weight
    produces quantization-corrupted hidden states, which then get quantized again in the
    KV cache, compounding errors. WKVQuant uses a calibration-based approach that optimizes
    both the weight quantization parameters and the KV scale/zero-point together to minimize
    the compound error. The key insight is that weight quantization errors are not independent
    of KV errors and should be co-optimized.
  key_idea: >
    WKVQuant frames the joint quantization problem as minimizing ‖ f(x; W, K, V) − f(x; Q(W), Q(K), Q(V)) ‖²
    over all quantization parameters simultaneously. In practice, it uses a block-wise
    alternating optimization: fix KV quantization, optimize W (as in GPTQ); fix W quantization,
    optimize KV. The KV quantization uses a NormalFloat-inspired grid for K (which it observes
    is more Gaussian than V) and per-token asymmetric for V. The joint optimization gives
    1–2% quality improvement over optimizing weight and KV independently.

