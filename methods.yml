  requires_training: true
  requires_calibration_data: false
  typical_degradation: "< 0.5% training loss degradation vs BF16 on most transformer models"

  tldr: >
    FP8 is a family of 8-bit floating-point formats designed to accelerate deep learning
    on NVIDIA H100 and later GPUs. Two variants are used in training: E4M3 (4 exponent bits,
    3 mantissa, range up to 448) for activations and weights in the forward pass, and E5M2
    (5 exponent, 2 mantissa, range up to 57344) for gradients in the backward pass. The
    Transformer Engine library automates the casting and scale management, using "delayed
    scaling" (scale from previous step's tensor max) to avoid a synchronization barrier.
    FP8 training achieves ~2× throughput vs BF16 at equivalent quality on GPT-3-scale models.
  key_idea: >
    FP8 training uses mixed-precision: weights, activations, and gradient computation are cast
    to FP8 E4M3/E5M2 for tensor core operations, while weight updates and accumulation happen
    in FP32 or BF16. A per-tensor scale s is maintained alongside each FP8 tensor; values are
    stored as FP8 × s. "Delayed scaling" reuses the previous iteration's scale (updated each
    step), avoiding an expensive all-reduce to find the current max. The Transformer Engine
    (NVIDIA's implementation) wraps PyTorch modules to automatically handle casting, scale
    management, and the custom FP8 GEMM kernels.

  builds_on: []
  superseded_by: []
  related: ["mx-formats", "deepseek-fp8", "nvfp4"]

  diagram: assets/diagrams/fp8-training.svg
