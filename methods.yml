- id: turboqu
  name: TurboQuant
  full_name: "TurboQuant: Online Vector Quantization with Near-Optimal Distortion Rate"
  category: ptq_weight_only
  subcategory: online-vector-quantization
  year: 2025
  date: 2025-04-28
  authors: ["unknown"]
