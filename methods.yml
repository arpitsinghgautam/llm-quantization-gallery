  precision: "W4A8KV4"
  granularity: "per-group (W4, g=128); per-token (A8); per-head (KV4)"
  calibration: "small calibration set for weight quantization"
  symmetric: asymmetric
  handles_outliers_via: "progressive group quantization (W4A8 with activation smoothing); SmoothQuant-style migration"
  hardware_target: "NVIDIA GPU (A100/H100); QoQ (Quarot-on-Quantized) custom INT4 Tensor Core kernels"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "< 1 ppl at W4A8KV4 on LLaMA-2-7B/13B/70B; 1.2–3.5× serving speedup vs FP16"

  tldr: >
    QServe is a system co-design paper targeting W4A8KV4 quantization for throughput-optimized
    LLM serving. Weights are stored at INT4 (per-group), activations at INT8 (per-token with
    SmoothQuant-style migration), and the KV cache at INT4 (per-head). The key algorithmic
    contribution is "progressive quantization": a W4→W8 dequantization path that avoids
    the poor W4A8 INT4-Tensor-Core quality problem by performing the dequant inside the
    kernel. The system contribution is QoQ (Quarot-on-Quantized), an INT4 matrix multiplication
    kernel that achieves 3.5× throughput over FP16 on A100.
  key_idea: >
    QServe's "progressive quantization" solves the W4A8 quality problem: INT4 Tensor Cores
    require weights in INT4, but directly multiplying INT4 weights by INT8 activations produces
    poor results due to limited weight range. The solution: dequantize INT4 weights to INT8
    inside the Tensor Core kernel (using the per-group scale stored in FP16 registers),
    then perform INT8 × INT8 matmul with INT32 accumulation. The KV cache is quantized
    to INT4 (per-head) with no quality loss using a rotation technique from QuaRot.
    The combined W4A8KV4 format yields 1.2× (LLaMA-2-70B) to 3.5× (LLaMA-2-7B) throughput
    improvement over FP16 serving on A100.

  builds_on: ["smoothquant", "gptq", "quarot"]
