  precision: "W4A16 (INT4 weight)"
  granularity: "per-column"
  calibration: "fine-tuning data"
  symmetric: symmetric
  handles_outliers_via: "fine-tuning adapts scale parameters alongside quantized weights"
  hardware_target: "GPU"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "approaches full-precision LoRA fine-tuning quality"

  tldr: >
    PEQA fine-tunes quantized LLMs by keeping the quantized integer weights frozen and
    only training per-column scale factors alongside the original dequantization scale.
    Rather than adding separate adapter matrices (like QLoRA), PEQA modifies the quantization
    scale itself — a minimal number of parameters that changes the effective floating-point
    value of the entire quantized column. This is computationally light and avoids the
    overhead of separate adapter matrices, while still giving the model freedom to shift
    its weight distribution during fine-tuning.
  key_idea: >
    For a quantized column w̃ = s · q_int (where s is the dequantization scale and q_int
    is the stored integer vector), PEQA introduces a learnable multiplier γ per column:
    w_eff = γ · s · q_int. During fine-tuning, only γ (one scalar per column) is updated;
    q_int remains frozen. The number of trainable parameters is one per column of each
    linear layer — much fewer than LoRA adapters. Despite this minimal parameterization,
    the scale multiplier can significantly shift the effective weight values column-wide,
    allowing meaningful task adaptation.

  builds_on: ["rtn", "gptq"]
  superseded_by: []
  related: ["qlora", "loftq", "qa-lora"]

  diagram: assets/diagrams/peqa.svg
  diagram_caption: "PEQA: fine-tune only per-column scale multipliers γ on frozen INT4 weights."

- id: loftq
  name: LoftQ
  full_name: "LoftQ: LoRA-Fine-Tuning-Aware Quantization for Large Language Models"
  category: qat
  subcategory: quantized-fine-tuning
  year: 2023
  date: 2023-10-12
  authors: ["Yixiao Li", "Yifan Yu", "Chen Liang", "Pengcheng He", "Nikos Karampatziakis", "Weizhu Chen", "Tuo Zhao"]
  affiliation: ["Georgia Tech", "Microsoft"]
  paper_url: https://arxiv.org/abs/2310.08659
  code_url: https://github.com/yxli2123/LoftQ
  blog_url: null
  venue: "ICLR 2024"

  precision: "W4A16 (quantized base) + BF16 LoRA"
  granularity: "per-group"
  calibration: "none for quantization phase"
  symmetric: asymmetric
  handles_outliers_via: "SVD-initialized LoRA adapters compensate for quantization error before fine-tuning starts"
  hardware_target: "GPU (bitsandbytes or GPTQ backend)"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "better starting point than QLoRA for fine-tuning; reduces quantization error propagation"

  tldr: >
    LoftQ improves on QLoRA by better initializing the LoRA adapters. In QLoRA, LoRA adapters
    start from random initialization and must both learn the task and compensate for the
    quantization error in the base model. LoftQ alternately optimizes the quantization of
    the base model and the initialization of LoRA adapters so that (quantized base + LoRA
    adapters) closely approximates the original FP16 weights before fine-tuning begins.
    This warm-start initialization reduces the gap between the quantized-and-adapter model
    and FP16, giving better convergence and higher accuracy at the same number of
    fine-tuning steps.
  key_idea: >
    LoftQ alternates between two steps: (1) Fix LoRA adapters (A, B) and quantize the
    residual W − B·A with any PTQ method (e.g. NF4 or GPTQ) to get Q̂(W − B·A). (2) Fix
    the quantization Q̂ and update (A, B) via SVD to minimize ‖ W − Q̂ − B·A ‖_F.
    After N iterations (typically 5), the LoRA adapters are initialized to compensate for
    the quantization error, and the base is quantized accordingly. Fine-tuning then starts
    from this better initialization. The alternating optimization is fast (no gradients —
    just SVD and PTQ).

  builds_on: ["qlora", "gptq"]
  superseded_by: []
