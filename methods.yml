  tldr: >
    FlatQuant argues that the key property needed for good quantization is "flatness" of the
    post-transformation weight/activation landscape, not just outlier suppression. It learns
    per-layer linear transformations (not necessarily restricted to orthogonal matrices)
    that minimize a measure of quantization-induced flatness loss. The transformations are
    more expressive than pure rotations and are jointly optimized across weights and
    activations using a calibration-based gradient method, achieving state-of-the-art W4A4
    results on LLaMA-2/3 families.
  key_idea: >
    For each layer, FlatQuant learns a pair of transformations (T_W, T_X) that approximately
    diagonalize the per-group weight and activation distributions — making the quantization
    error approximately independent across dimensions. The transformation includes a rotation
    component (enforced to be near-orthogonal via a regularizer) plus a learned channel-wise
    scaling. The overall transformation is more expressive than Hadamard or pure rotation.
    Optimization minimizes the block-wise reconstruction loss ‖ f(X; W) − f(T_X X; T_W W) ‖²
    using Adam on the transformation parameters while keeping model weights frozen.

