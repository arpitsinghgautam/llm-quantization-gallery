  authors: ["Coleman Hooper", "Sehoon Kim", "Hasan Anil Anil", "Michael W. Mahoney", "Yakun Sophia Shao", "Kurt Keutzer", "Amir Gholami"]
  affiliation: ["UC Berkeley", "ICSI"]
