  tldr: >
    FP6-LLM makes 6-bit floating-point weight quantization practical on NVIDIA GPUs that
    have no native FP6 hardware support. The method packs FP6 weights (1 sign, 2 exponent,
    3 mantissa bits) into standard GPU memory layouts and implements a GPU kernel (TC-FPx)
    that unpacks and converts FP6 to FP16 during the matrix multiplication, achieving
    near-FP16 throughput. The floating-point format's larger dynamic range compared to
    INT6 means FP6 requires less clipping, which is important for LLM weights with
    outlier channels.
  key_idea: >
    The core contribution is a CUDA kernel strategy called TC-FPx that enables arbitrary
    bit-width (e.g. FP6) matrix multiplications on Tensor Cores without native hardware
    support. Weights are stored in a bitpacked format; during matmul, each FP6 weight is
    unpacked and up-cast to FP16 in registers before multiplication, leveraging the GPU's
    native FP16 Tensor Cores. The unpacking is done in SIMT warps in a way that is
    bandwidth-efficient and avoids branching. At 6 bits, floating-point representation
    outperforms integer (INT6) because the non-uniform grid better fits the near-Gaussian
    weight distributions of large LLMs.

  builds_on: ["rtn"]
