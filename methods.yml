  diagram_caption: "Data-free QAT: model generates its own training data, STE backprops through quantization."

- id: peqa
  name: PEQA
  full_name: "PEQA: Parameter-Efficient Fine-Tuning of Quantized Large Language Models"
  category: qat
  subcategory: quantized-fine-tuning
  year: 2023
  date: 2023-04-05
  authors: ["Chanho Park", "Jungwook Choi"]
  affiliation: ["Hanyang University"]
  paper_url: https://arxiv.org/abs/2304.02384
  code_url: null
