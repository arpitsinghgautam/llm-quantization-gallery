  tldr: >
    QuaRot applies random Hadamard rotations to the weight and activation spaces of every
    linear layer in the transformer. A Hadamard rotation is orthogonal (preserves matrix
    products exactly) and has the effect of spreading activation outliers uniformly across
    all dimensions. After rotation, activations are nearly isotropic with no dominant
    outlier channels, making per-token INT4 quantization of activations feasible with
    minimal quality loss. Weights are correspondingly pre-rotated offline and then quantized.
    The result is practical W4A4 inference with quality close to W4A16 GPTQ.
  key_idea: >
    For each linear layer Y = XW, a random Hadamard matrix H is applied: Y = (XH)(H^T W).
    Since H is orthogonal, H H^T = I, so the output is unchanged. The rotated weight H^T W
    is computed offline and stored. At inference, activations are pre-multiplied by H before
    each layer (and post-multiplied by H^T after). The Hadamard transform, being a Walsh-Hadamard
    transform, can be computed in O(n log n) and is cheap relative to the matmul.
    After rotation, activation channels all have similar variance (no outliers remain dominant),
    allowing per-token INT4 quantization of X with RTN or GPTQ for W. The rotation is also
    applied to KV cache computation, enabling W4A4KV4 with minimal perplexity degradation.

  builds_on: ["quip", "gptq"]
  superseded_by: []
  related: ["spinquant", "duquant", "flatquant", "quip"]

  diagram: assets/diagrams/quarot.svg
  diagram_caption: "Hadamard rotation equalizes activation magnitudes, enabling W4A4 without outlier handling."

- id: spinquant
  name: SpinQuant
  full_name: "SpinQuant: LLM Quantization with Learned Rotations"
  category: ptq_weight_activation
  subcategory: rotation-based
  year: 2024
  date: 2024-05-25
  authors: ["Zechun Liu", "Changsheng Zhao", "Igor Fedorov", "Bilge Soran", "Dhruv Mahajan", "Raghuraman Krishnamoorthi", "Vikas Chandra", "Yuandong Tian", "Tijmen Blankevoort"]
  affiliation: ["Meta AI"]
  paper_url: https://arxiv.org/abs/2405.16406
  code_url: https://github.com/facebookresearch/SpinQuant
  blog_url: null
  venue: "ICLR 2025"

  precision: "W4A8 / W4A4"
  granularity: "per-group (weights); per-token (activations)"
  calibration: "small calibration set for rotation learning"
  symmetric: symmetric
  handles_outliers_via: "learned orthogonal rotation minimizes post-rotation quantization error"
  hardware_target: "GPU (NVIDIA)"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "outperforms QuaRot at W4A4 on LLaMA-2/3 by learning optimal rotation"

  tldr: >
    SpinQuant is the learned-rotation extension of QuaRot. Instead of using a fixed random
    Hadamard matrix, SpinQuant optimizes the rotation matrix R on the Stiefel manifold
    (the set of orthogonal matrices) to minimize the quantization error of the rotated
    activations. The optimization uses Cayley SGD — a manifold-aware gradient method
    for orthogonal matrices — and runs on a small calibration set. Because the rotation
    is learned to specifically minimize quantization error (rather than just spreading
    outliers randomly), SpinQuant consistently outperforms QuaRot at equal bit-widths.
  key_idea: >
    SpinQuant parameterizes the rotation as R ∈ O(d) (the orthogonal group) and minimizes
    E_x [ ‖ Q(RX) − RX ‖² ] over R, where Q is the quantizer and x is drawn from the
    calibration set. The gradient on the manifold is computed using the Riemannian gradient:
    ∇^{manifold}_R L = R (∇_R L - (∇_R L)^T R^T R) (Cayley SGD step).
    After learning R, the weight matrices are pre-rotated (offline) and quantized with GPTQ.
    At inference, activations are rotated by R before each layer. Hadamard matrices can be
    used to initialize R (as in QuaRot) and then refined by SpinQuant's optimization.

  builds_on: ["quarot", "quip"]
  superseded_by: []
  related: ["quarot", "duquant", "flatquant"]

  diagram: assets/diagrams/spinquant.svg
  diagram_caption: "Learned rotation on Stiefel manifold minimizes post-rotation quantization error."

