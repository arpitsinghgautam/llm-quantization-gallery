  year: 2023
  date: 2023-05-23
  authors: ["Tim Dettmers", "Artidoro Pagnoni", "Ari Holtzman", "Luke Zettlemoyer"]
  affiliation: ["University of Washington"]
  paper_url: https://arxiv.org/abs/2305.14314
  code_url: https://github.com/artidoro/qlora
  blog_url: null
  venue: "NeurIPS 2023"

  precision: "W4A16 (NF4 base) + BF16 LoRA adapters"
  granularity: "per-group g=64 (NF4 double-quant)"
  calibration: "none for base quantization; fine-tuning on task data"
  symmetric: "n/a (NF4)"
  handles_outliers_via: "NF4 quantile grid; LoRA adapters learn residual corrections"
  hardware_target: "NVIDIA GPU (bitsandbytes NF4 kernels)"
  requires_training: true
  requires_calibration_data: false
  typical_degradation: "approaches full-precision LoRA fine-tuning quality on most tasks"

  tldr: >
    QLoRA makes fine-tuning 65B+ parameter models possible on a single 48GB GPU by keeping
    the base model frozen in 4-bit NF4 quantization and training only lightweight LoRA
    adapters in BF16. The quantized base model provides a good initialization; the LoRA
    adapters learn the task-specific residual correction without having to update the
    quantized weights directly. QLoRA introduces NF4 (the quantile-spaced 4-bit normal
    float), double quantization (quantizing the quantization scales themselves), and
    paged optimizers to handle gradient checkpointing on consumer hardware.
  key_idea: >
    QLoRA freezes the base model weights in NF4 quantization and adds rank-r LoRA adapter
    matrices (A ∈ ℝ^{d×r}, B ∈ ℝ^{r×d}) to each linear layer. During a forward pass, the
    NF4 weights are dequantized to BF16 for the matmul (no INT4×INT4 compute — dequant
    before multiply), and the LoRA output is added: h = W_NF4×x + B×A×x. Only A and B
    have gradients; the quantized W_NF4 is frozen. The NF4 quantization error acts as a
    form of noise that the LoRA adapters learn to compensate for. Paged optimizers handle
    out-of-memory spikes by offloading optimizer states to CPU RAM during gradient checkpointing.

  builds_on: ["bitsandbytes-nf4"]
  superseded_by: []
  related: ["loftq", "qa-lora", "ir-qlora", "apiq"]

  diagram: assets/diagrams/qlora.svg
  diagram_caption: "NF4 frozen base + BF16 LoRA adapters: fine-tune 65B on one 48GB GPU."

