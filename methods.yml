- id: bitsandbytes-nf4
  name: NF4 / QLoRA
  full_name: "QLoRA: Efficient Finetuning of Quantized LLMs (NF4 / FP4 formats)"
  category: ptq_weight_only
  subcategory: normal-float
  year: 2023
  date: 2023-05-23
  authors: ["Tim Dettmers", "Artidoro Pagnoni", "Ari Holtzman", "Luke Zettlemoyer"]
  affiliation: ["University of Washington"]
  paper_url: https://arxiv.org/abs/2305.14314
  code_url: https://github.com/artidoro/qlora
  blog_url: null
  venue: "NeurIPS 2023"

  precision: "W4A16 (NF4)"
  granularity: "per-group, g=64 (double quantization)"
  calibration: "none for quantization; LoRA adapters are trained separately"
  symmetric: "n/a (non-uniform NF4 grid)"
  handles_outliers_via: "NF4 quantile grid inherently handles Gaussian tails; double quantization for scales"
  hardware_target: "GPU (bitsandbytes CUDA kernels)"
  requires_training: false
  requires_calibration_data: false
  typical_degradation: "< 0.5 ppl on LLaMA-7B; specifically designed to minimize quantization error for normally-distributed weights"

  tldr: >
    The QLoRA paper introduced the NF4 (Normal Float 4-bit) data type: a 4-bit format whose
    quantization levels are spaced at the quantiles of the standard normal distribution, rather
    than linearly. Because pre-trained LLM weights are approximately normally distributed,
    NF4 achieves lower expected quantization error than uniform INT4 at the same bit-width.
    QLoRA also introduces "double quantization" (quantizing the per-group scales themselves
    to 8 bits) and paged optimizers to fit fine-tuning of 65B+ models into a single GPU.
    NF4 is implemented in bitsandbytes and is now the dominant format for memory-efficient
    inference of base models.
  key_idea: >
    NF4 construction: given a standard normal distribution, compute the 16 quantiles
    q₀, q₁, ..., q₁₅ (including ±∞ boundaries). Normalize to [-1, 1]. These 16 values
    are the NF4 codebook. Quantize weight w as: round(w / s) → nearest NF4 code index
    (lookup table), where s = max(|W|) / max(NF4 codes). The quantiles are closer together
    near zero (where most weights concentrate) and farther at the tails, matching the
    Gaussian distribution's probability density. Double quantization: each per-group scale
    is itself stored as FP8 with a shared FP32 super-scale, saving an extra 0.125 bits/weight.

  builds_on: ["rtn"]
  superseded_by: []
  related: ["gptq", "awq", "hqq", "qlora"]

  diagram: assets/diagrams/bitsandbytes-nf4.svg
  diagram_caption: "NF4 quantile grid: 16 levels at Gaussian quantiles; double-quantized per-group scale."

- id: autoround
  name: AutoRound
  full_name: "AutoRound: Automatic Rounding-based Weight-Only Quantization for Language Models"
  category: ptq_weight_only
  subcategory: sign-gradient
  year: 2023
  date: 2023-09-11
  authors: ["Wenhua Cheng", "Weiwei Zhang", "Haihao Shen", "Yiyang Cai", "Xin He", "Kaokao Lv"]
  affiliation: ["Intel Corporation"]
  paper_url: https://arxiv.org/abs/2309.05516
  code_url: https://github.com/intel/auto-round
  blog_url: null
  venue: null

  precision: "W4A16"
  granularity: "per-group, g=128"
  calibration: "512 sequences × 2048 tokens"
  symmetric: asymmetric
  handles_outliers_via: "sign gradient descent for rounding decisions (not just round-to-nearest)"
  hardware_target: "GPU / Intel hardware"
  requires_training: false
  requires_calibration_data: true
  typical_degradation: "close to or better than GPTQ at 4-bit on most benchmarks"

  tldr: >
    AutoRound improves on GPTQ's rounding decisions by framing quantization as a
    block-wise sign-gradient descent problem rather than an analytic second-order update.
    Each weight's rounding direction (floor vs. ceil) is treated as a binary decision
    variable, and these decisions are optimized jointly within each block by computing
    sign gradients of the block reconstruction loss. This allows AutoRound to find
    better rounding patterns than the greedy column-by-column approach of GPTQ,
    without requiring more memory than a calibration forward pass.
  key_idea: >
    AutoRound uses Signed Gradient Descent (SignSGD) to optimize rounding decisions.
    Starting from RTN as initialization, for each block AutoRound iteratively updates
    the rounding offsets Δ_ij ∈ {0, 1} (floor or ceil) according to:
    Δ ← clip(Δ − lr · sign(∇_Δ ‖ f(X; W) − f(X; W̃) ‖²), 0, 1).
    This is run for a fixed number of iterations (200 by default) per block.
    Unlike GPTQ which processes columns sequentially, AutoRound treats the block jointly.
    The resulting rounding patterns tend to be more balanced, especially at 4-bit.

  builds_on: ["gptq", "rtn"]
  superseded_by: []
  related: ["gptq", "awq", "omniquant"]

  diagram: assets/diagrams/autoround.svg
  diagram_caption: "Sign gradient descent optimizes rounding direction per weight jointly within each block."

