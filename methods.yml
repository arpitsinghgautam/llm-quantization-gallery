  tldr: >
    ZeroQuant is Microsoft's W8A8 PTQ framework for large-scale transformer inference,
    integrated into DeepSpeed. It introduces per-token activation quantization (one scale
    per output token vector rather than one scale per entire activation tensor) and per-group
    weight quantization (small blocks of 64–128 consecutive weights share a scale). Together,
    these finer-grained quantization schemes significantly reduce quantization error vs.
    per-tensor approaches. ZeroQuant also provides a knowledge-distillation fine-tuning
    option (ZeroQuant-FT) to further recover quality after quantization.
  key_idea: >
    For the weight matrix W ∈ ℝ^{d_out × d_in}, ZeroQuant uses per-group quantization:
    groups of g consecutive elements in each row share a scale s and zero-point z.
    For activations X ∈ ℝ^{T × d_in}, per-token quantization is used: each row (token)
    gets its own scale max(|X_t|)/127, computed online during inference.
    The combination of fine-grained weight quantization and dynamic per-token activation
    quantization gives high accuracy with real hardware speedup. ZeroQuant uses LeCun et al.'s
    optimal brain damage approach for a lightweight knowledge-distillation step to recover
    any remaining accuracy gap.

  builds_on: ["rtn"]
  superseded_by: ["zeroquant-v2", "smoothquant"]
  related: ["llm-int8", "smoothquant", "atom"]

