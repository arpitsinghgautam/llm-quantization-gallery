  tldr: >
    MLC-LLM is a machine learning compilation framework that enables LLM inference on any
    hardware with near-native performance, including Apple Silicon (Metal), NVIDIA GPUs
    (CUDA), AMD GPUs (Vulkan), WebGPU (browser), iOS, and Android. It uses the Apache TVM
    compiler to generate optimized kernels for each target from a unified model specification.
    MLC-LLM supports AWQ-style W4A16 quantization, INT8, and FP16, with automatic kernel
    generation for each backend. This makes it the primary runtime for cross-platform
    quantized LLM deployment including mobile and browser environments.
  key_idea: >
    MLC-LLM compiles each model to a target-specific shared library via TVM. The compilation
    pipeline: (1) model spec in Relax IR (TVM's high-level IR); (2) quantization applied
    at the IR level; (3) auto-tuning of kernel schedules per target hardware; (4) code
    generation to CUDA PTX / Metal Shading Language / GLSL (Vulkan) / JS (WebGPU).
    Quantized weights (W4A16 AWQ-compatible) are stored in a compact binary format and
    loaded at runtime. The dequantization is fused into the matmul kernel via TVM's
    operator fusion. The same model spec runs on all backends, with only the kernels
    differing per platform.

