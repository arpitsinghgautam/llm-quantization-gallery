<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="93 LLM quantization methods — fact sheets, SVG diagrams, Mermaid flowcharts, and interactive filtering." />
    <title>LLM Quantization Gallery</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
      // Apply dark mode before paint to prevent flash
      ;(function () {
        const stored = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
