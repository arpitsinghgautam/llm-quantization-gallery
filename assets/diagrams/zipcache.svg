<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#3DAD78" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">ZipCache</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W16A16KV4 (mixed: salient tokens higher)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for ZipCache -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W16A16KV4 (mixed: salient tokens …</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-token, adaptive bit-width</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     kv_cache</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">ZipCache quantizes the KV cache with mixed</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">precision, assigning more bits to &quot;salient&quot;</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">tokens — those with high cumulative attention</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">scores that are frequently attended to. The</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">attention score of each token is tracked</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">dynamically during generation, and tokens</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">ZipCache maintains a running sum of attention</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">scores for each KV position across all heads</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">and layers. Positions whose cumulative</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">importance score exceeds a dynamic threshold θ</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">(tuned to achieve a target average bit-width)</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#3DAD78">https://arxiv.org/abs/2405.14256</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Yefei He, Luoming Zhang, Weijia Wu</text>

</svg>
