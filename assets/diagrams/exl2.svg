  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">EXL2 is the quantization format native to the ExLlamaV2 inference engine. It extends</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">GPTQ's approach with per-row bit-width assignment: different rows (output c</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">EXL2 quantization proceeds in two passes: (1) compute per-row Hessian importance</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">scores (using the squared input activation norms, as in GPTQ), then assign bit-widths</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">row-by-row using a greedy algorit</text>

