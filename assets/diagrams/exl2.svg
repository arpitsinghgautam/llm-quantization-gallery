  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">EXL2 is the quantization format native to the</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">ExLlamaV2 inference engine. It extends GPTQ's</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">approach with per-row bit-width assignment:</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">different rows (output channels) of each</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">weight matrix are quantized to different</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">bit-widths (2–8), with the assignment</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">EXL2 quantization proceeds in two passes: (1)</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">compute per-row Hessian importance scores</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">(using the squared input activation norms, as</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">in GPTQ), then assign bit-widths row-by-row</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">using a greedy algorithm that maximizes</text>

