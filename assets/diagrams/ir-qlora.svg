<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#7B68EE" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">IR-QLoRA</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (NF4 base) + BF16 LoRA</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for IR-QLoRA -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (NF4 base) + BF16 LoRA</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  fine-tuning data</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">IR-QLoRA identifies that the NF4 quantization</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">grid used in QLoRA is fixed (based on the</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">standard normal distribution) and may not be</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">optimal for every layer's actual weight</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">distribution. IR-QLoRA adapts the NF4</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">quantization levels per layer by minimizing</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Two components: (1) Information Calibration —</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">the NF4 quantization levels for each layer are</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">shifted slightly from the standard-normal</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">quantiles to the empirical quantiles of that</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">layer's actual weight distribution, minimizing</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2402.05445</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Haotong Qin, Xudong Ma, Xingyu Zheng</text>

</svg>
