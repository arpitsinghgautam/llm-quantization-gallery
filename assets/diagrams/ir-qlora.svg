<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#7B68EE" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">IR-QLoRA</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (NF4 base) + BF16 LoRA</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for IR-QLoRA -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (NF4 base) + BF16 LoRA</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  fine-tuning data</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">IR-QLoRA identifies that the NF4 quantization grid used in QLoRA is fixed (based on</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">the standard normal distribution) and may not be optimal for every layer's a</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Two components: (1) Information Calibration — the NF4 quantization levels for each</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">layer are shifted slightly from the standard-normal quantiles to the empirical</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">quantiles of that layer's actual weigh</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2402.05445</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Haotong Qin, Xudong Ma, Xingyu Zheng</text>

</svg>
