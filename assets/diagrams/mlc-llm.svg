<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#607D8B" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">MLC-LLM</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (AWQ-style), W8A8, FP16</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for MLC-LLM -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (AWQ-style), W8A8, FP16</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  varies by method</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     CUDA, Metal (Apple Silicon), Vulk…</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     systems</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#607D8B" opacity="0.08" stroke="#607D8B" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">MLC-LLM is a machine learning compilation</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">framework that enables LLM inference on any</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">hardware with near-native performance,</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">including Apple Silicon (Metal), NVIDIA GPUs</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">(CUDA), AMD GPUs (Vulkan), WebGPU (browser),</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">iOS, and Android. It uses the Apache TVM</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">MLC-LLM compiles each model to a</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">target-specific shared library via TVM. The</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">compilation pipeline: (1) model spec in Relax</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">IR (TVM's high-level IR); (2) quantization</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">applied at the IR level; (3) auto-tuning of</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#607D8B"></text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Tianqi Chen, Ruihang Lai, Junru Shao</text>

</svg>
