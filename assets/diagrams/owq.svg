  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">OWQ</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W3/W4 A16 (mixed)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for OWQ -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W3/W4 A16 (mixed)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-column (most), per-weight FP16 for s</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for Hessian column norms</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">OWQ identifies the weight columns whose quantization errors propagate most</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">destructively to the output — those corresponding to large-magnitude activation chann</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">For each linear layer, compute the Hessian diagonal [H]_jj = E[x_j²] (mean squared</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">activation for input channel j). Columns j with the largest [H]_jj values are the</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">most sensitive; the top few percent</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#4A90D9">https://arxiv.org/abs/2306.02272</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Changhun Lee, Jungyu Jin, Taesu Kim</text>

