<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#4A90D9" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">OWQ</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W3/W4 A16 (mixed)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for OWQ -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W3/W4 A16 (mixed)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-column (most), per-weight FP1…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for Hessian colum…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">OWQ identifies the weight columns whose</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">quantization errors propagate most</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">destructively to the output — those</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">corresponding to large-magnitude activation</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">channels — and keeps them in FP16, quantizing</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">everything else to low bits. This is</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">For each linear layer, compute the Hessian</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">diagonal [H]_jj = E[x_j²] (mean squared</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">activation for input channel j). Columns j</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">with the largest [H]_jj values are the most</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">sensitive; the top few percent are kept at</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#4A90D9">https://arxiv.org/abs/2306.02272</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Changhun Lee, Jungyu Jin, Taesu Kim</text>

</svg>
