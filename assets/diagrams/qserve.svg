<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E87D3E" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">QServe</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A8KV4</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for QServe -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A8KV4</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (W4, g=128); per-token …</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  small calibration set for weight …</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA GPU (A100/H100); QoQ (Quar…</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">QServe is a system co-design paper targeting</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">W4A8KV4 quantization for throughput-optimized</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">LLM serving. Weights are stored at INT4</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">(per-group), activations at INT8 (per-token</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">with SmoothQuant-style migration), and the KV</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">cache at INT4 (per-head). The key algorithmic</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">QServe's &quot;progressive quantization&quot; solves the</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">W4A8 quality problem: INT4 Tensor Cores</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">require weights in INT4, but directly</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">multiplying INT4 weights by INT8 activations</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">produces poor results due to limited weight</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#E87D3E">https://arxiv.org/abs/2405.04532</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Yujun Lin, Haotian Tang, Shang Yang</text>

</svg>
