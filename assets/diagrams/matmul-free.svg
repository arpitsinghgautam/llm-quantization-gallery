  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     extreme_lowbit</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#E84393" opacity="0.08" stroke="#E84393" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">MatMul-free LM eliminates all matrix multiplications from the transformer by</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">replacing linear layers with ternary-weight operations (implementable as add/subtra</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Two innovations: (1) Linear layers use ternary weight matrices (BitNet b1.58 style),</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">so W·x becomes a sum/difference of x elements selected by W ∈ {-1,0,+1}. No</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">multiplications are needed in the linea</text>

