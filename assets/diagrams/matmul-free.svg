  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E84393" opacity="0.08" stroke="#E84393" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">MatMul-free LM eliminates all matrix</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">multiplications from the transformer by</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">replacing linear layers with ternary-weight</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">operations (implementable as add/subtract) and</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">replacing the standard attention mechanism</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">with a linear-time RNN-like token mixing</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Two innovations: (1) Linear layers use ternary</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">weight matrices (BitNet b1.58 style), so W·x</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">becomes a sum/difference of x elements</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">selected by W ∈ {-1,0,+1}. No multiplications</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">are needed in the linear layers. (2) The</text>

