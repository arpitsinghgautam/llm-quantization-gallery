<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#D4A027" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">NVFP4</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">NVFP4 weights + FP8/FP16 activations</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for NVFP4 -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    NVFP4 weights + FP8/FP16 activations</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  block of 16 elements share one FP8 scale</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration data for static scale comput</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA Blackwell (B100/B200/GB200/RTX 50</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     low_precision_training</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#D4A027" opacity="0.08" stroke="#D4A027" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">NVFP4 is NVIDIA's 4-bit floating-point format introduced for Blackwell-architecture</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">GPUs. It uses E2M1 encoding (2 exponent bits, 1 mantissa, 1 sign bit = 4 bit</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">NVFP4 stores weights in 4 bits (E2M1 format: values from ±{0.5, 1.0, 1.5, 2.0, 3.0,</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">4.0, 6.0}). Every 16 consecutive weights share one FP8 block scale. At inference,</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">weights are dequantized per block</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#D4A027"></text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: NVIDIA Corporation</text>

</svg>
