  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">PEQA</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (INT4 weight)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for PEQA -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (INT4 weight)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-column</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  fine-tuning data</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">PEQA fine-tunes quantized LLMs by keeping the</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">quantized integer weights frozen and only</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">training per-column scale factors alongside</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">the original dequantization scale. Rather than</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">adding separate adapter matrices (like QLoRA),</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">PEQA modifies the quantization scale itself —</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">For a quantized column w̃ = s · q_int (where s</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">is the dequantization scale and q_int is the</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">stored integer vector), PEQA introduces a</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">learnable multiplier γ per column: w_eff = γ ·</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">s · q_int. During fine-tuning, only γ (one</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2304.02384</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Chanho Park, Jungwook Choi</text>

</svg>
