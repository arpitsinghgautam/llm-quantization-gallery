  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">DeepSeek's FP8 recipe uses "fine-grained quantization" — smaller tiles than the</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">standard per-tensor approach. Weights: each 1×128 row segment has its own FP8 scale.</text>
