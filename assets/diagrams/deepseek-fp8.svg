  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">DeepSeek FP8 Training</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">FP8 (E4M3 forward / E5M2 gradient) with fine…</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for DeepSeek FP8 Training -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    FP8 (E4M3 forward / E5M2 gradient…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  tile-level (1×128 rows, 128×128 c…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  dynamic during training</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA H800 (FP8 Tensor Cores)</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     low_precision_training</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#D4A027" opacity="0.08" stroke="#D4A027" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">DeepSeek-V3 (671B MoE model) was trained with</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">FP8 mixed-precision throughout, making it one</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">of the largest models trained with FP8. The</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">key engineering contribution is a fine-grained</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">block scaling scheme where weight scales are</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">per 1×128 tile and activation scales are per</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">DeepSeek's FP8 recipe uses &quot;fine-grained</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">quantization&quot; — smaller tiles than the</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">standard per-tensor approach. Weights: each</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">1×128 row segment has its own FP8 scale.</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">Activations: each 128×128 block has its own</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#D4A027">https://arxiv.org/abs/2412.19437</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: DeepSeek-AI</text>

</svg>
