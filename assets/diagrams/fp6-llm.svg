  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">FP6-LLM makes 6-bit floating-point weight quantization practical on NVIDIA GPUs that</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">have no native FP6 hardware support. The method packs FP6 weights (1 sign,</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">The core contribution is a CUDA kernel strategy called TC-FPx that enables arbitrary</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">bit-width (e.g. FP6) matrix multiplications on Tensor Cores without native hardware</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">support. Weights are stored in</text>

