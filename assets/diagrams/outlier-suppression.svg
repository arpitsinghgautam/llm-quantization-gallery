<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E87D3E" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">Outlier Suppression</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W8A8</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for Outlier Suppression -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W8A8</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-tensor or per-channel</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for activation st…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">Outlier Suppression identifies that outlier</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">activation channels cause disproportionate</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">quantization error and proposes two techniques</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">to mitigate them without changing the model</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">architecture. Gamma correction shifts outlier</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">channels by their maximum value to center them</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Two components: (1) Channel-wise shifting: for</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">each activation channel j with extreme</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">outliers, subtract a pre-computed offset c_j</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">(computed from calibration max values) before</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">quantization, and absorb +c_j into the bias of</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#E87D3E">https://arxiv.org/abs/2209.13325</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2022  |  Authors: Xiuying Wei, Yunchen Zhang, Xiangguo Zhang</text>

</svg>
