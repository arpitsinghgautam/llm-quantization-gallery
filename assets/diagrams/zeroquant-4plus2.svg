<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E87D3E" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">ZeroQuant(4+2)</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4+W6 A8 (mixed: sensitive layers at FP6, re…</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for ZeroQuant(4+2) -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4+W6 A8 (mixed: sensitive layers…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (W4); per-tensor FP6 (s…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for layer sensiti…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU (H100 with FP8 path; general …</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">ZeroQuant(4+2) extends the ZeroQuant series by</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">proposing a mixed W4+W6 strategy: the majority</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">of layers use W4A8 (INT4 weight, INT8</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">activation) for high compression, while the</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">most sensitive layers (typically the first and</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">last layers, plus selected attention layers)</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Layer sensitivity scoring: run the ZeroQuant</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">quantization on each block independently and</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">measure the reconstruction loss increase.</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">Assign FP6 to the top-k% most sensitive layers</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">(by score). For the remaining layers, use W4A8</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#E87D3E">https://arxiv.org/abs/2312.08583</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Xiaoxia Wu, Haojun Xia, Stephen Youn</text>

</svg>
