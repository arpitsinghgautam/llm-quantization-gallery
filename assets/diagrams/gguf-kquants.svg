  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W3/W4/W5/W6 A16</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for GGUF K-quants -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W3/W4/W5/W6 A16</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  super-block of 256 weights; inner…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     CPU / GPU / Metal (llama.cpp)</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">The K-quant formats in llama.cpp use a</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">two-level hierarchical quantization scheme. A</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">super-block of 256 weights contains several</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">inner blocks of 16–32 weights each. Each inner</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">block has its own low-precision scale</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">(quantized), while the super-block stores the</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">The hierarchy is: weights at b bits →</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">inner-block scale at b' bits → super-block</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">scale at FP16. For Q4_K_M: 4-bit weights,</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">6-bit inner-block scales (for every 32</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">weights), FP16 super-block scale (for every</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#4A90D9"></text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Georgi Gerganov, contributors</text>

</svg>
