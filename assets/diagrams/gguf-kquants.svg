  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">The K-quant formats in llama.cpp use a two-level hierarchical quantization scheme. A</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">super-block of 256 weights contains several inner blocks of 16–32 weights e</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">The hierarchy is: weights at b bits → inner-block scale at b' bits → super-block</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">scale at FP16. For Q4_K_M: 4-bit weights, 6-bit inner-block scales (for every 32</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">weights), FP16 super-block scale (for</text>

