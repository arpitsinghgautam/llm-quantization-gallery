  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">QAQ adaptively allocates bit-widths across KV</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">cache entries based on their predicted</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">importance to the attention output. Tokens</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">that receive high attention scores (the</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">&quot;attention sink&quot; phenomenon — early tokens and</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">recent tokens tend to receive disproportionate</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">QAQ uses a proxy for KV importance: the</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">accumulated attention scores that a token has</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">received across all heads and layers so far.</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">Tokens with high accumulated attention</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">(estimated from running statistics during</text>

