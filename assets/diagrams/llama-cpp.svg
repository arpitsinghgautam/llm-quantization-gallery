<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#607D8B" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">llama.cpp (GGUF)</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W3/W4/W5/W6/W8 A16 (GGUF K-quants and I-q…</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for llama.cpp (GGUF) -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W3/W4/W5/W6/W8 A16 (GGUF K-qua…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  hierarchical two-level (K-quants)…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none (K-quants); imatrix optional…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     CPU (x86, ARM), GPU (CUDA, Metal,…</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     systems</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#607D8B" opacity="0.08" stroke="#607D8B" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">llama.cpp is the most widely used open-source</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">LLM inference engine for consumer hardware.</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">Written in C++, it supports CPU, GPU</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">(CUDA/Metal/Vulkan), and heterogeneous</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">inference. Its GGUF quantization format</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">(K-quants: Q2_K through Q6_K; I-quants: IQ1_S</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">llama.cpp implements transformer inference</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">from scratch in C++ with portable backends.</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">Key design choices: (1) row-major packed GGUF</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">format for memory-efficient quantized storage;</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">(2) architecture-specific SIMD optimizations</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#607D8B"></text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Georgi Gerganov, contributors</text>

</svg>
