<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#607D8B" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">llama.cpp (GGUF)</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W3/W4/W5/W6/W8 A16 (GGUF K-quants and I-quants)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for llama.cpp (GGUF) -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W3/W4/W5/W6/W8 A16 (GGUF K-quants and I-quants)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  hierarchical two-level (K-quants) or lat</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none (K-quants); imatrix optional (I-qua</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     CPU (x86, ARM), GPU (CUDA, Metal, Vulkan</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     systems</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#607D8B" opacity="0.08" stroke="#607D8B" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">llama.cpp is the most widely used open-source LLM inference engine for consumer</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">hardware. Written in C++, it supports CPU, GPU (CUDA/Metal/Vulkan), and heteroge</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">llama.cpp implements transformer inference from scratch in C++ with portable</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">backends. Key design choices: (1) row-major packed GGUF format for memory-efficient</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">quantized storage; (2) architecture-spe</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#607D8B"></text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Georgi Gerganov, contributors</text>

</svg>
