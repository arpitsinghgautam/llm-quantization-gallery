  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">ThinK takes a different approach to KV cache compression: instead of quantizing all</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">elements of the K cache, it prunes specific dimensions (channels) of the key</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">For head h with queries Q ∈ ℝ^{T_q × d} and keys K ∈ ℝ^{T_k × d}, compute the</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">per-dimension importance score: I_j = ‖ Q_j ⊙ K_j ‖ (element-wise product of the j-th</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">query and key dimension, summed over</text>

