<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#4A90D9" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">Marlin</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (INT4), W4A8 (INT4 weight, FP8 activat…</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for Marlin -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (INT4), W4A8 (INT4 weight, …</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group, g=128</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  n/a (inference kernel)</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA A100/H100 (Ampere/Hopper);…</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">Marlin is a high-performance CUDA kernel</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">library for W4A16 and W4A8 grouped-quantized</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">matrix multiplication on NVIDIA GPUs. For a</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">transformer layer serving a single token</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">(decode phase), the bottleneck is memory</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">bandwidth: loading the 4-bit weight matrix.</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Marlin's kernel decomposes the matmul into</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">tiles processed by persistent warps. Each warp</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">prefetches the next tile of INT4 weights from</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">global memory while the previous tile's FP16</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">dequantization and tensor-core accumulation</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#4A90D9">https://arxiv.org/abs/2408.11743</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Elias Frantar, Roberto L. Castro, Jiale Chen</text>

</svg>
