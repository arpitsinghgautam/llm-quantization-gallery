<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#3DAD78" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">SKVQ</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W16A16KV2/KV4</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for SKVQ -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W16A16KV2/KV4</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-channel (with sliding window …</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none (online)</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     kv_cache</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">SKVQ tackles the challenge that KV cache</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">quantization must work online — quantization</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">parameters cannot be computed from future</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">tokens. Naive online quantization suffers from</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">stale statistics: the quantization scale</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">computed at token 1 may be wrong at token 1000</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">For each KV head, maintain a sliding window of</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">the W most recent raw (FP16) KV vectors.</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">Compute the quantization scale from this</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">window: s = max(|K_{t-W:t}|) / 127. Apply this</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">scale to quantize the current K_t. As the</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#3DAD78">https://arxiv.org/abs/2405.06484</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Haojie Duanmu, Zhihang Yuan, Xiuhong Li</text>

</svg>
