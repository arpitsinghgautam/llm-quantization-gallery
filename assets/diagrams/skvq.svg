  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">SKVQ tackles the challenge that KV cache quantization must work online — quantization</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">parameters cannot be computed from future tokens. Naive online quantizatio</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">For each KV head, maintain a sliding window of the W most recent raw (FP16) KV</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">vectors. Compute the quantization scale from this window: s = max(|K_{t-W:t}|) / 127.</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">Apply this scale to quantize the cu</text>

