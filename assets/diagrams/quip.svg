  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W4 A16</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for QuIP -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W4 A16</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group after rotation</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for Hessian and rotation</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU (custom dequantization kernels neede</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">QuIP is the first method to achieve practical 2-bit LLM quantization with theoretical</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">guarantees. The key insight is "incoherence processing": by multiplying we</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">The weight matrix W is transformed as W̃ = U W Vᵀ where U and V are random orthogonal</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">matrices (pre- and post-multiplication). An orthogonal transformation doesn't change</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">the Frobenius norm of the err</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#4A90D9">https://arxiv.org/abs/2307.13304</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Jerry Chee, Yaohui Cai, Volodymyr Mnih</text>

</svg>
