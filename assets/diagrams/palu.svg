  <!-- Generic diagram for Palu -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W16A16KV reduced-rank</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-head, low-rank projection</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for SVD of K/V projectio</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     kv_cache</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">Palu compresses the KV cache not by quantizing its values but by projecting K and V</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">into a low-rank subspace before caching, and projecting back at attention ti</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Original: k = x W_K (d→d projection). Palu: factorize W_K ≈ W_K^low W_K^proj where</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">W_K^low ∈ ℝ^{d×r} and W_K^proj ∈ ℝ^{r×d}. Cache only the low-rank representation:</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">k_low = x W_K^low ∈ ℝ^r (store r fl</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#3DAD78">https://arxiv.org/abs/2407.21118</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Chi-Chih Chang, Wei-Cheng Lin, Chien-Yu Lin</text>

