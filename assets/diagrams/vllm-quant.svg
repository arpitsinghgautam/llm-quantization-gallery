<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#607D8B" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">vLLM (Quantization)</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (GPTQ/AWQ/Marlin), W8A8 (FP8), W4A8 (M…</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for vLLM (Quantization) -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (GPTQ/AWQ/Marlin), W8A8 (FP…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (varies by backend)</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  depends on method (none for AWQ l…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA GPU (A100/H100); AMD GPU (…</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     systems</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#607D8B" opacity="0.08" stroke="#607D8B" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">vLLM is the dominant open-source LLM serving</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">framework for production deployment, built</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">around PagedAttention for efficient KV cache</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">management. Its quantization support includes</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">native GPTQ (Triton kernel), AWQ (custom</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">CUDA), Marlin (high-throughput W4A16), FP8</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">vLLM's quantization stack is a collection of</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">backend kernels selected by model format: GPTQ</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">→ Triton kernel (or Exllama2 backend); AWQ →</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">custom fused CUDA; W4A16 → Marlin; FP8 → H100</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">FP8 Tensor Core kernel; INT8 SmoothQuant →</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#607D8B">https://arxiv.org/abs/2309.06180</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Woosuk Kwon, Zhuohan Li, Siyuan Zhuang</text>

</svg>
