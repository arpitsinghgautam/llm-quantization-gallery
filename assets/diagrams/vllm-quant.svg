  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#607D8B" opacity="0.08" stroke="#607D8B" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">vLLM is the dominant open-source LLM serving framework for production deployment,</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">built around PagedAttention for efficient KV cache management. Its quantizatio</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">vLLM's quantization stack is a collection of backend kernels selected by model</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">format: GPTQ → Triton kernel (or Exllama2 backend); AWQ → custom fused CUDA; W4A16 →</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">Marlin; FP8 → H100 FP8 Tensor Core k</text>

