  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for QuaRot / Quant-LLM (FP6) -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4/W6 A16</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_only</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#4A90D9" opacity="0.08" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">Quant-LLM explores mixed-precision serving that pairs FP6 weight quantization with</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">token-level speculative decoding. Latency-sensitive layers get W6A16 (FP6 wei</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Quant-LLM assigns FP6 quantization to the first and last layers of the transformer</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">(which are most sensitive to quantization error) and INT4 to the middle layers. The</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">FP6 layers use the TC-FPx kernel</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#4A90D9">https://arxiv.org/abs/2405.08925</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Haojun Xia, Zhen Zheng, Xiaoxia Wu</text>

