<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#7B68EE" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">LLM-QAT</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A8KV4 / W4A8</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for LLM-QAT -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A8KV4 / W4A8</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-channel</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  data-free: uses model's own gener…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">LLM-QAT performs quantization-aware training</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">of LLMs without any task data by using the</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">model's own generations as training examples —</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">the model &quot;teaches itself&quot; to be robust to</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">quantization noise. This data-free approach</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">avoids privacy concerns and the cost of</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Training data is generated by sampling from</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">the (FP16) model itself using temperature</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">sampling. The model is then fine-tuned on</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">these samples with simulated quantization</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">inserted: all weight matrices and activations</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2305.17888</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Zechun Liu, Barlas Oguz, Changsheng Zhao</text>

</svg>
