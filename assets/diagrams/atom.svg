  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A4 (mixed with W8 for sensitive…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (weights, g=128); per-t…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for outlier detec…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     NVIDIA GPU (INT4 Tensor Cores on …</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">Atom targets W4A4 quantization (both weights</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">and activations at 4 bits), which enables</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">using INT4 Tensor Cores for compute-bound</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">speedup in addition to memory savings. The</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">challenge is that activations are hard to</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">quantize to 4 bits due to outliers. Atom's</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">Three components: (1) Outlier channel</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">detection — identify top-k outlier activation</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">channels by their magnitude; assign them W8A8</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">treatment. (2) Channel reordering — group</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">outlier and non-outlier channels separately in</text>

