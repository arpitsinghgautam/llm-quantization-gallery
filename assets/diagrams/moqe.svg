  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W4 A16 (expert-specific)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-expert, mixed bit-widths</text>
