  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     moe</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#9B59B6" opacity="0.08" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">MoQE (Mixture of Quantization Experts) addresses the unique quantization challenge of</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">Mixture-of-Experts (MoE) models: the MoE architecture has many experts (su</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">MoQE assigns bit-widths per expert based on two factors: (1) activation frequency —</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">how often each expert is routed to across the calibration set (can be computed</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">cheaply from the router logits); (2)</text>

