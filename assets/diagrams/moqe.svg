<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#9B59B6" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">MoQE</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W4 A16 (expert-specific)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for MoQE -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W4 A16 (expert-specific)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-expert, mixed bit-widths</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for expert import…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     moe</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#9B59B6" opacity="0.08" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">MoQE (Mixture of Quantization Experts)</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">addresses the unique quantization challenge of</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">Mixture-of-Experts (MoE) models: the MoE</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">architecture has many experts (sub-networks),</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">but only a few activate per token. Calibration</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">data therefore sees each expert only a small</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">MoQE assigns bit-widths per expert based on</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">two factors: (1) activation frequency — how</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">often each expert is routed to across the</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">calibration set (can be computed cheaply from</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">the router logits); (2) quantization</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#9B59B6">https://arxiv.org/abs/2310.02410</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Xiaodong Chen, Wenbo Mao, Wei Zhang</text>

</svg>
