<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E87D3E" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">ZeroQuant</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W8A8</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for ZeroQuant -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W8A8</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (weights, g=64 or g=128…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  small calibration set</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU (DeepSpeed inference engine)</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">ZeroQuant is Microsoft's W8A8 PTQ framework</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">for large-scale transformer inference,</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">integrated into DeepSpeed. It introduces</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">per-token activation quantization (one scale</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">per output token vector rather than one scale</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">per entire activation tensor) and per-group</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">For the weight matrix W ∈ ℝ^{d_out × d_in},</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">ZeroQuant uses per-group quantization: groups</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">of g consecutive elements in each row share a</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">scale s and zero-point z. For activations X ∈</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">ℝ^{T × d_in}, per-token quantization is used:</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#E87D3E">https://arxiv.org/abs/2206.01861</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2022  |  Authors: Zhewei Yao, Reza Yazdani Aminabadi, Minjia Zhang</text>

</svg>
