  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">PV-Tuning addresses the poor convergence of</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">STE at extreme compression (2-bit vector</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">quantization). The STE approximation (treating</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">the quantization round as the identity during</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">backpropagation) becomes severely wrong at</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">2-bit because the quantization distortion is</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">For a vector-quantized weight block w = C[i]</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">(codebook entry), PV-Tuning updates the</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">codebook assignment by: (1) compute the</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">continuous gradient ∇_{w} L as if w were free;</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">(2) find the nearest codebook entry to w −</text>

