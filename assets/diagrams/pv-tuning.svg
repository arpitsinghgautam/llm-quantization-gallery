  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2405.14852</text>
