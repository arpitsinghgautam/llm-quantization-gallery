  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">PV-Tuning addresses the poor convergence of STE at extreme compression (2-bit vector</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">quantization). The STE approximation (treating the quantization round as th</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">For a vector-quantized weight block w = C[i] (codebook entry), PV-Tuning updates the</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">codebook assignment by: (1) compute the continuous gradient ∇_{w} L as if w were</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">free; (2) find the nearest codeboo</text>

