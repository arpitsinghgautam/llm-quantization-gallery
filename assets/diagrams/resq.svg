  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A8 with FP16 low-rank residual …</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-channel + low-rank subspace d…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set for PCA of activa…</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">ResQ decomposes activation tensors into two</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">parts: a low-rank subspace that captures the</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">dominant outlier directions (kept in FP16),</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">and the complementary subspace that is free of</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">outliers (quantized to INT8). The subspace</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">decomposition is computed via PCA on</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">PCA is run on calibration activations to</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">identify the top-k principal components that</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">capture the outlier variance. The weight</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">matrix is decomposed as W = W_sub * P +</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">W_rest, where P is the outlier projection. At</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
