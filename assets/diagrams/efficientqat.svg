<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#7B68EE" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">EfficientQAT</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W2/W4 A16</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for EfficientQAT -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W2/W4 A16</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  fine-tuning on public text corpus (WikiT</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">EfficientQAT proposes a two-stage block-wise quantization-aware training pipeline</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">that makes end-to-end QAT of 70B+ parameter models tractable. Stage 1: block-w</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Stage 1 (block-wise QAT): for each block i, freeze all other blocks and optimize the</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">quantized block with STE on the standard LM loss using block-local inputs (from the</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">frozen preceding blocks). This</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2407.11062</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Mengzhao Chen, Wenqi Shao, Peng Xu</text>

