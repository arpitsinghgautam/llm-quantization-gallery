<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#3DAD78" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">WKVQuant</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16KV4</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for WKVQuant -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16KV4</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (W); per-channel (K); p…</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  calibration set</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     kv_cache</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">WKVQuant jointly optimizes weight and KV-cache</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">quantization, observing that weight and KV</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">quantization errors interact during</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">generation: a quantized weight produces</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">quantization-corrupted hidden states, which</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">then get quantized again in the KV cache,</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">WKVQuant frames the joint quantization problem</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">as minimizing ‖ f(x; W, K, V) − f(x; Q(W),</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">Q(K), Q(V)) ‖² over all quantization</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">parameters simultaneously. In practice, it</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">uses a block-wise alternating optimization:</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#3DAD78">https://arxiv.org/abs/2402.12065</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Yuxuan Yue, Zhihang Yuan, Haojie Duanmu</text>

</svg>
