  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">ExLlamaV2's core innovation is the EXL2 quantization format (detailed in the EXL2</text>
