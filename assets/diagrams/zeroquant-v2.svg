<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E87D3E" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">ZeroQuant-V2</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4/W8 A8</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for ZeroQuant-V2 -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4/W8 A8</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group (weights); per-token (activati</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  small calibration set</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU (DeepSpeed)</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     ptq_weight_activation</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#E87D3E" opacity="0.08" stroke="#E87D3E" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">ZeroQuant-V2 extends ZeroQuant with a comprehensive study of quantization granularity</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">effects and a new technique called Low-Rank Compensation (LoRC). LoRC adds</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Low-Rank Compensation: given quantization error E = W − Q(W), compute truncated SVD U</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">Σ Vᵀ ≈ E keeping top-r singular values. Store the quantized weight as Q(W) + U·(ΣVᵀ),</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">where UΣV^T is kept in FP16</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#E87D3E">https://arxiv.org/abs/2303.08302</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Zhewei Yao, Xiaoxia Wu, Cheng Li</text>

</svg>
