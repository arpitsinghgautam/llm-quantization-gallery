  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">Optimal Brain Surgeon (OBS) is the classical second-order framework for weight</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">pruning (and later, quantization). It computes, for each weight w_q, the increase</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">For a network with loss L(w) ≈ L(w₀) + ½(w−w₀)^T H (w−w₀), removing weight w_q</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">introduces error δL = w_q² / (2[H⁻¹]_qq). The optimal compensation update for the</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">remaining weights is Δw = −(w_q / [H⁻¹]</text>

