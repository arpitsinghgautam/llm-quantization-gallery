<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#3DAD78" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">SageAttention</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">Q8K8V16 (INT8 Q and K for QK^T, FP16 V)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for SageAttention -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    Q8K8V16 (INT8 Q and K for QK^T, F…</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-token for Q and K quantization</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  none (dynamic at runtime)</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU (CUDA); H100 / A100 optimized</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     no</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     kv_cache</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#3DAD78" opacity="0.08" stroke="#3DAD78" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">SageAttention quantizes Q and K to INT8 to</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">compute the attention score matrix (QK^T)</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">using integer tensor cores, while keeping V in</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">FP16. A plug-and-play drop-in for standard</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">attention requiring no fine-tuning or</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">calibration. Per-token smooth quantization</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">The QK^T matmul dominates attention FLOPs at</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">long context. SageAttention replaces it with</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">INT8 GEMM: each Q and K token vector is scaled</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">to INT8 range independently (per-token</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">quantization), QK^T is computed in INT8 on</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#3DAD78">https://arxiv.org/abs/2410.02367</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2024  |  Authors: Jintao Zhang, Jia Wei, Haofeng Huang</text>

</svg>
