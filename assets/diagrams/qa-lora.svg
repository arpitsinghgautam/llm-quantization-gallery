<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#7B68EE" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">QA-LoRA</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W4A16 (group-wise)</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for QA-LoRA -->
  <!-- Fact panel (left) -->
  <rect x="30" y="80" width="355" height="340" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W4A16 (group-wise)</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-group, adapter output merged …</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  fine-tuning data</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     GPU</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     qat</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="170" rx="6" fill="#7B68EE" opacity="0.08" stroke="#7B68EE" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="125" font-family="monospace" font-size="11" fill="#555">QA-LoRA identifies a problem with QLoRA: when</text>
  <text x="435" y="145" font-family="monospace" font-size="11" fill="#555">the LoRA adapters are merged back into the</text>
  <text x="435" y="165" font-family="monospace" font-size="11" fill="#555">base model after fine-tuning, the merged</text>
  <text x="435" y="185" font-family="monospace" font-size="11" fill="#555">weights are no longer well-fit by the original</text>
  <text x="435" y="205" font-family="monospace" font-size="11" fill="#555">quantization grid. QA-LoRA rethinks the</text>
  <text x="435" y="225" font-family="monospace" font-size="11" fill="#555">adapter design so that the merged (adapter +</text>

  <!-- Key idea -->
  <rect x="415" y="260" width="355" height="150" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="285" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="305" font-family="monospace" font-size="11" fill="#555">In QA-LoRA, LoRA adapters are applied</text>
  <text x="435" y="325" font-family="monospace" font-size="11" fill="#555">per-group: each rank-r adapter acts on a group</text>
  <text x="435" y="345" font-family="monospace" font-size="11" fill="#555">of g weight elements, modifying the effective</text>
  <text x="435" y="365" font-family="monospace" font-size="11" fill="#555">group scale and zero-point. The adapter output</text>
  <text x="435" y="385" font-family="monospace" font-size="11" fill="#555">B·A is added to the group-level dequantization</text>

  <!-- Bottom -->
  <rect x="30" y="420" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="442" font-family="monospace" font-size="11" fill="#7B68EE">https://arxiv.org/abs/2309.14717</text>
  <text x="50" y="462" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Yuhui Xu, Lingxi Xie, Xiaotao Gu</text>

</svg>
