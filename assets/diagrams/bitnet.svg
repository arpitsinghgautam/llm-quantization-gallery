<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" fill="#E84393" rx="4"/>
  <text x="20" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="white">BitNet</text>
  <text x="780" y="38" font-family="monospace" font-size="16" fill="white" text-anchor="end">W1A8</text>

  <!-- Content area -->
  <rect x="0" y="60" width="800" height="440" fill="#F8F9FA" rx="0"/>


  <!-- Generic diagram for BitNet -->
  <!-- Fact panel -->
  <rect x="30" y="80" width="355" height="290" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="108" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Method Properties</text>
  <text x="50" y="132" font-family="monospace" font-size="11" fill="#555">Precision:    W1A8</text>
  <text x="50" y="152" font-family="monospace" font-size="11" fill="#555">Granularity:  per-tensor (weights); per-token (activat</text>
  <text x="50" y="172" font-family="monospace" font-size="11" fill="#555">Calibration:  training from scratch</text>
  <text x="50" y="192" font-family="monospace" font-size="11" fill="#555">Hardware:     custom hardware / CPU (no native 1-bit G</text>
  <text x="50" y="212" font-family="monospace" font-size="11" fill="#555">Training:     yes</text>
  <text x="50" y="232" font-family="monospace" font-size="11" fill="#555">Category:     extreme_lowbit</text>

  <!-- TL;DR -->
  <rect x="415" y="80" width="355" height="150" rx="6" fill="#E84393" opacity="0.08" stroke="#E84393" stroke-width="1.5"/>
  <text x="435" y="105" font-family="monospace" font-size="12" font-weight="bold" fill="#333">TL;DR</text>
  <text x="435" y="127" font-family="monospace" font-size="11" fill="#555">BitNet proposes training LLMs with binary ({-1, +1}) weight matrices from scratch,</text>
  <text x="435" y="147" font-family="monospace" font-size="11" fill="#555">with 8-bit activations. All weight matrices in the transformer (attention pro</text>

  <!-- Key idea -->
  <rect x="415" y="250" width="355" height="120" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="275" font-family="monospace" font-size="12" font-weight="bold" fill="#333">Mechanism</text>
  <text x="435" y="297" font-family="monospace" font-size="11" fill="#555">Each weight w in a BitLinear layer is binarized as: b = sign(w), and a per-tensor</text>
  <text x="435" y="317" font-family="monospace" font-size="11" fill="#555">scale α = mean(|W|) is stored. During forward pass: y = Q_act(x) · (b · α) where</text>
  <text x="435" y="337" font-family="monospace" font-size="11" fill="#555">Q_act is INT8 activation quantization</text>

  <!-- Bottom -->
  <rect x="30" y="390" width="740" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="50" y="415" font-family="monospace" font-size="11" fill="#E84393">https://arxiv.org/abs/2310.11453</text>
  <text x="50" y="435" font-family="monospace" font-size="11" fill="#555">Year: 2023  |  Authors: Hongyu Wang, Shuming Ma, Li Dong</text>

</svg>
